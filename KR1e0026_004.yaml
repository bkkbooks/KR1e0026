body:
  text: 春秋集解卷四宋蘇轍撰閔公元年春王正月閔公子般之庶弟不言即位繼故也親之非父也尊之非君也繼之如君父也者受國焉耳齊人救郉夏六月辛酉葬我君莊公秋八月公及齊侯盟于落姑季子來歸慶父之賊子般也季友奔陳君幼國亂魯人思其賢請於齊侯而復之齊侯使召諸陳公次于郎以待之蓋魯大夫之出未有言其至者也書曰季子來歸喜之也不書其出子般之難力不能禁為之諱之也冬齊仲孫來齊仲孫湫來省難歸曰不去慶父魯難未巳桓公曰若之何而去之曰難不已將自斃君其待之公曰魯可取乎對曰猶秉周禮未可動也故書曰齊仲孫來存魯亡魯制在仲孫非齊侯之所使也不書其名嘉之也其言來非盟且非聘也公羊穀梁曰齊仲孫者公子慶父也謂之齊仲孫外之也魯慶父而謂之齊仲孫春秋豈嘗然乎二年春王正月齊人遷陽夏五月乙酉吉禘于莊公禘吉祭也禮三年之喪畢而禘于太廟以正昭穆今未三年而用吉禮以禘于莊廟故書曰吉禘于莊公不稱莊宫何也用其禮物以祭莊公而不及羣廟也秋八月辛丑公薨慶父使卜齮賊公于武闈故書公薨而不地不書葬不成喪也九月夫人姜氏孫于邾夫人通於慶父欲立之閔公之薨夫人與知之故出奔不言奔諱之也公子慶父出奔莒慶父之賊子般而奔齊也書曰公子慶父如齊其弑閔公而奔莒也書曰公子慶父出奔莒何也方其賊般而奔齊也君臣之義當誅矣季子推兄弟之恩因其出奔而緩之可也及其復弑閔公也雖欲以兄弟置之不可得矣故正其罪而書出奔於是季友以賂求慶父於莒而殺之然而春秋不書刺公子慶父何也季子以兄弟故殺之於隱不名其罪也然則叔牙之死也曰公子牙卒而慶父不卒何也牙之罪不見故可以言卒也慶父之罪見於出奔矣不可復卒也蓋莊閔之際禍發於兄弟季子處之義行於不得已而恩施於不可復加春秋蓋善之也冬齊高子來盟此齊髙傒也其盟平魯亂也不言使不書其名猶仲孫也十有二月狄入衞鄭棄其師鄭文公惡髙克之為人使將兵而禦狄于河上久而不召師潰而歸髙克奔陳鄭之所惡者髙克也而幷不反其衆則是棄其師也春秋集解卷四
