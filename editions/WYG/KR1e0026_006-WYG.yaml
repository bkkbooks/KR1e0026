body:
  text: 春秋集解卷六宋蘇轍撰文公元年春王正月公即位莊襄未葬而子般子野卒其稱名未逾年也文成定之即位也僖宣昭皆未葬其稱公以即位既逾年也一年不可以二君故終年稱子而未葬則名不可以逾年無君故逾年雖未葬而稱公以即位也其非即位則雖逾年不稱公八年八月天王崩九年春毛伯來求金不稱王命是也二月癸亥日有食之天王使叔服來㑹葬叔服天子大夫故不名諸侯之葬天子使大夫㑹焉禮也夏四月丁巳葬我君僖公天王使毛伯來錫公命毛伯王之卿士也禮諸侯即位天子錫之命圭合瑞以為信晉惠公之立也王使召武公内史過錫之命而惰於受瑞是也晉侯伐衞叔孫得臣如京師衞人伐晉晉以衞之不朝也伐之衞孔達伐晉以報背盟而亢大國稱人罪之也秋公孫敖㑹晉侯于戚禮卿不㑹諸侯而魯大夫出㑹諸侯皆無譏魯史也冬十月丁未楚世子商臣弑其君頵頵成王也商臣稱世子而頵稱君者君之於世子有父之親有君之尊稱世子明其親也稱君明其尊也商臣之於尊親盡矣公孫敖如齊二年春王二月甲子晉侯及秦師戰于彭衙秦師敗績丁丑作僖公主作主不書此所以書非時也禮葬畢而虞虞而作主喪主於虞吉主於練虞主用桑練主用栗三月乙巳及晉處父盟晉人以公不朝來討公如晉晉人使陽處父盟公以恥之禮諸侯不親盟於他國而况敵處父乎故不書公如晉又不書公及晉處父盟諱之也處父之不氏罪晉也夏六月公孫敖㑹宋公陳侯鄭伯晉士縠盟于垂隴謀衞也於是衞執孔達以説于晉自十有二月不雨至于秋七月八月丁卯大事于太廟躋僖公大事者何合昭穆於太廟也禮三年喪畢而禘未畢喪故不曰禘也然則吉禘于莊公其曰禘何也禮樂備也禮樂備曰吉禘不備曰大事僖公閔公之兄也閔嘗為之君矣兄弟之不先君臣禮也其曰躋僖公非禮也所謂逆祀也冬晉人宋人陳人鄭人伐秦殽之敗秦穆公不替孟明而悔過自誓列於周書及彭衙之敗復用孟明増脩徳政重施於民君子善之晉人使先且居㑹宋公子成陳轅選鄭公子歸生伐之取汪及彭衙以報彭衙之役卿稱人以其不務徳而力爭罪之也罪晉所以善秦也公子遂如齊納幣三年春王正月叔孫得臣㑹晉人宋人陳人衞人鄭人伐沈沈潰夏五月王子虎卒秦人伐晉秦伯伐晉濟河焚舟取王官及郊晉人不出遂自茅津濟封殽尸而還遂伯西戎書曰秦人伐晉而不稱秦伯何也亦不善其爭也諸侯之相侵伐者衆矣春秋因其得失而正之未有不善其爭者也此獨不善其爭何也春秋之際諸侯以力相尚而不知徳未可以非其爭也穆公之悔過自誓為近之矣而猶未免於爭是以非之也秋楚人圍江雨螽于宋冬公如晉十有二月己巳公及晉侯盟晉人懼其無禮於公也故請改盟雖親盟於其國猶可書也晉陽處父帥師伐楚以救江伐楚而圍江之師解此所以救江也四年春公至自晉夏逆婦姜于齊卿不行非禮也曰婦有姑之詞也公羊曰娶于大夫畧之也公子遂如齊納幣納幣于齊也孰謂娶于大夫乎榖梁曰親迎而曰婦成禮乎齊也不言公何以知其親迎也宋蕩伯姫來逆婦把伯姫來求婦皆由姑言之也狄侵齊秋楚人滅江晉侯伐秦晉侯圍邧新城以報王官之役稱晉侯不復罪之何也見伐而報非得罪於法也而有徳者不然故特一譏而已若皆譏之將不可勝譏也衞侯使寗俞來聘冬十有一月壬寅夫人風氏薨僖公之妾母也凡魯君之妾母其生也稱夫人其沒皆以夫人之禮成之而天子諸侯亦以夫人之禮禮之考之舊典則非禮也然春秋書之不為異詞者君臣之禮也五年春王正月王使榮叔歸含且賵珠玉曰含車馬曰賵不言天王闕文也不言來歸避不周也榖梁曰不言來不周事之詞也賵以蚤含以晚禮曰含者執璧將命入升堂致命子拜稽顙含者坐委於殯東南有葦席既葬蒲席降出反位盖以助喪盡恩而不必用也且國有遠近而皆責其及事可乎三月辛亥葬我小君成風王使召伯來㑹葬仲子雖聘而非惠公之嫡也故特為之宫而不祔不書其葬盖禮之正也自成風以來妾母皆葬盖祔也魯禮之變自此始矣諸侯必有使來㑹葬者矣以微故不錄王人雖微必書石尚歸脤是也而况召伯乎夏公孫敖如晉秦人入鄀秋楚人滅六冬十月甲申許男業卒六年春葬許僖公夏季孫行父如陳秋季孫行父如晉八月乙亥晉侯驩卒冬十月公子遂如晉葬晉襄公晉殺其大夫陽處父晉狐射姑出奔狄晉人蒐于夷使狐射姑將中軍趙盾佐之陽處父至自溫改蒐于董謂趙盾能而上之射姑怨之使續鞠居殺之晉殺鞠居射姑奔狄不書射姑之殺而書曰晉殺其大夫陽處父何也處父之死自取之也置帥非處父之任也處父有罪則其不稱晉人以殺何也雖有罪而殺之則甚矣故書曰狐射姑出奔狄亦罪之也閏月不告月猶朝于廟不告月者不告朔也何以不言朔閏非常月也雖非常月而告月以聼政禮也其曰猶朝于廟幸其不已之詞也子貢欲去告朔之餼羊子曰爾愛其羊我愛其禮雖不告月而猶朝于廟而又將己之乎公羊榖梁曰閏月者附月之餘日天子不以告朔而喪事不數也猶之為言可以已也春秋盖有同詞而異實者矣猶三望猶繹可以已也猶朝于廟幸其不已也七年春公伐邾三月甲戌取須句僖公取須句而反其君邾又滅之故復伐邾而取之遂城郚以備邾也夏四月宋公王臣卒宋人殺其大夫宋昭公將去羣公子穆襄之族帥國人以攻公殺公孫固公孫鄭于公宫書曰宋人殺其大夫非君命也大夫不名非其罪也夫君殺之而非其罪則書曰宋殺其大夫公孫固公孫鄭可也宋人殺之而非其君若又名之則不見其非罪也戊子晉人及秦人戰于令狐晉先蔑奔秦晉襄公卒靈公少晉人為難故欲立長君趙盾使先蔑士㑹逆公子雍于秦既而畏偪乃背之而立靈公趙盾將而禦秦師先蔑奔秦趙盾之稱人罪之也舍太子而外求君非謀也先蔑之不言出自師奔也狄侵我西鄙秋八月公㑹諸侯晉大夫盟于扈齊侯宋公衞侯鄭伯許男曹伯㑹晉趙盾盟于扈晉侯立故也不書其人公後至不及序也冬徐伐莒公孫敖如莒涖盟八年春王正月夏四月秋八月戊申天王崩冬十月壬午公子遂㑹晉趙盾盟于衡雍乙酉公子遂㑹雒戎盟于暴公子遂既盟趙盾四日而盟雒戎皆公命也何以知其皆公命也以其書雒戎之盟與書趙盾之盟一也公孫敖如京師不至而復丙戌奔莒七年公子遂娶于莒公孫敖如莒涖盟且為遂逆見女美而自取之遂將攻之公止之使遂舍之使敖反之復為兄弟如初及敖將如周弔遂以幣奔莒從己氏公子遂如齊至黄乃復書至而後書復今不言至而言復何也遂之如齊也欲至齊而以疾不能敖無至周之意矣故曰不至而已不言出自外行也螽宋人殺其大夫司馬宋司城來奔宋襄夫人襄王之姊也昭公不禮焉夫人因戴氏之族以殺襄公之孫孔叔公孫鍾離及大司馬公子卬皆昭公之黨也司馬握節以死故書以官書曰宋人殺其大夫非君命也司城蕩意諸來奔效節於府人而出公以其官逆之亦書以官皆貴之也九年春毛伯來求金非禮也不稱王命未葬也夫人姜氏如齊歸寧也二月叔孫得臣如京師辛丑葬襄王晉人殺其大夫先都夷之蒐晉侯將登箕鄭父先都而使士縠梁益耳將中軍先克曰狐趙之勲不可廢也從之先克奪蒯得田于菫隂故箕鄭父先都士縠梁益耳蒯得作亂使賊殺先克晉人誅之故皆書曰晉人殺其大夫殺有罪也三月夫人姜氏至自齊春秋夫人適他國未有至之者皆非禮不告廟故也惟此以歸寧告廟故書晉人殺其大夫士縠及箕鄭父楚人伐鄭楚自城濮之敗不復侵伐中國晉文襄既沒靈公少自是始復伐鄭公子遂㑹晉人宋人衞人許人救鄭晉趙盾宋華耦衞孔達許大夫救鄭緩不及楚師故皆稱人夏狄侵齊秋八月曹伯襄卒九月癸酉地震冬楚子使椒來聘楚自僖公以來雖交通諸侯而朝聘不常盟㑹不繼夷風猶在也故書其君臣皆曰人而已至是齊晉日衰楚人接迹於中國於是書其君臣與諸侯比然椒猶不氏盖漸進之也秦人來歸僖公成風之襚魯之喪諸侯盖有來襚者矣而獨書秦始通也秦人秦之微者也襚衣服也僖公成風之喪乆矣而不以緩為譏者亦以其始通録之也成風之不稱夫人何也非薨非葬名有所不必盡也葬曹共公十年春王三月辛卯臧孫辰卒夏秦伐晉是年春晉人伐秦取少梁秦伯伐晉取北徵秦晉相攻乆矣無他得失而獨書曰秦伐晉遂以戎狄書之理不然也或者書秦伯闕文也楚殺其大夫宜申宜申與仲歸謀弑楚穆王而誅當書曰楚人殺大夫盖以簡文也自正月不雨至于秋七月及蘇子盟于女栗冬狄侵宋楚子蔡侯次于厥貉將伐宋而不行故書次十有一年春楚子伐麇夏叔仲彭生㑹晉郤缺于承匡秋曹伯來朝公子遂如宋狄侵齊冬十月甲午叔孫得臣敗狄于鹹十有二年春王正月郕伯來奔郕太子朱儒自安於夫鍾國人不徇郕伯卒郕人立君太子以夫鍾及郕邽來奔公以諸侯逆之非禮也書曰郕伯來奔著吾過也不名非諸侯特加之也不書地既謂之諸侯尊之不言地也把伯來朝二月庚子子叔姫卒夏楚人圍巢秋滕子來朝秦伯使術來聘冬十有二月戊午晉人秦人戰于河曲秦伯伐晉取羈馬晉趙盾禦之皆稱人以其亟戰罪之也季孫行父帥師城諸及鄆十有三年春王正月夏五月壬午陳侯朔卒邾子蘧蒢卒自正月不雨至于秋七月太室屋壊周公曰太廟魯公曰太室屋壊書不共也冬公如晉衞侯㑹公于沓狄侵衞十有二月己丑公及晉侯盟公還自晉鄭伯㑹公于棐十有四年春王正月公至自晉邾人伐我南鄙叔彭生帥師伐邾夏五月乙亥齊侯潘卒六月公㑹宋公陳侯衞侯鄭伯許男曹伯晉趙盾癸酉同盟于新城㑹書月盟書日㑹成於月盟成於日也書同盟從於楚者服也秋七月有星孛入于北斗公至自㑹晉人納㨗葘于邾弗克納邾文公元妃齊姜生貜且二妃晉姫生㨗葘文公卒邾人立貜且㨗葘奔晉晉趙盾帥諸侯之師八百乗納之于邾邾人辭曰齊出貜且長盾曰詞順而弗從不祥乃還書盾之弗克納善之矣其稱人何也興諸侯之師將以廢長立少入邾之境而後知其非所興者廣所害者衆善未足以覆過也捷葘之不稱公子將以為君也九月甲申公孫敖卒于齊敖之奔莒七年矣至此請重賂以求復其子難以為請許之將歸而卒於齊大夫出奔不卒敖之卒既許之復也齊公子商人弑其君舍商人將以為君其稱公子何也州吁無知將以為君而不終故不稱公子以見其欲為君也商人終為君矣不待去公子而後見也稱公子以親責之也舍未逾年而稱君既葬也若以其未逾年而不稱君是商人之罪可得而免也正舍之名所以正商人之罪也宋子哀來奔宋髙哀為蕭封人以為卿不義宋公而出二年而宋人弑其君不名而字貴之也冬單伯如齊齊人執單伯齊人執子叔姫子叔姫妃齊昭公生舍商人弑舍而立襄仲使告于王請以王寵求子叔姫于齊王使單伯為魯請齊人執之并執子叔姫諸侯而執王使不稱行人尊周也公羊榖梁曰單伯之罪道淫也猶以為魯大夫也魯無單伯以意而言春秋則亦無所不至也十有五年春季孫行父如晉為單伯與子叔姫故將因晉以謂齊也三月宋司馬華孫來盟宋司馬華耦來盟其官皆從故書曰宋司馬華孫不言使盟在華孫也夏曹伯來朝齊人歸公孫敖之喪敖以罪出魯人以孟氏故不絶其親而許其歸禮也六月辛丑朔日有食之鼓用牲于社單伯至自齊齊侯以晉故許單伯請單伯過魯致命而歸周故喜而致之也晉郤缺帥師伐蔡戊申入蔡秋齊人侵我西鄙季孫行父如晉復為齊故也冬十有一月諸侯盟于扈晉侯宋公衞侯蔡侯鄭伯許男曹伯㑹盟而謀伐齊於是有齊難公不㑹齊侯賂晉侯不克而還書曰諸侯而不序無能為也十有二月齊人來歸子叔姫不言齊子叔姫來歸而曰齊人來歸子叔姫言叔姫無罪而齊人絶之也齊侯侵我西鄙遂伐曹入其郛齊侯謂諸侯無能為也故復侵魯遂伐曹討其朝於魯也十有六年春季孫行父㑹齊侯于陽穀齊侯弗及盟公將及齊平而有疾使季孫行父㑹齊侯而請盟齊侯不信曰請俟君間書曰齊侯弗及盟曲在齊也夏五月公四不視朔諸侯告朔聼政因朝于廟公四不視朔疾也公盖有以疾不視朔者矣四不視朔以久書也公羊曰自是無疾不視朔也定哀之間子貢欲去告朔之餼羊盖不復視朔矣此公羊之所以為此言也然而五月書四不視朔則六月視朔之廢非始為此也六月戊辰公子遂及齊侯盟于郪丘公使遂納賂于齊侯而後受盟秋八月辛未夫人姜氏薨毁泉䑓有虵自泉䑓出既而夫人薨魯人以為妖而毁之非政也楚人秦人巴人滅庸冬十有一月宋人弑其君杵臼宋昭公不能於其大夫國人襄夫人亦惡之公田孟諸夫人使帥甸攻而弑之書曰宋人弑其君君無道也十有七年春晉人衞人陳人鄭人伐宋晉荀林父衞孔達陳公孫寧鄭石虎將討宋之弑君不克而還故皆稱人夏四月癸亥葬我小君聲姜齊侯伐我西鄙六月癸未公及齊侯盟于穀諸侯㑹于扈晉侯為扈之㑹將以平宋亂而不能故書曰諸侯而不序畧之也宋昭公雖以無道弑而諸侯大夫皆以不討賊為譏明君臣之義不可廢也秋公至自榖冬公子遂如齊十有八年春王二月丁丑公薨于䑓下秦伯罃卒夏五月戊戌齊人弑其君商人商人多行無禮其為公子也與邴歜之父争田弗勝及即位掘而刖之納閻職之妻而使職驂乗故二人謀而殺之二人皆非大夫不稱盗而稱人見君之無道也六月癸酉葬我君文公秋公子遂叔孫得臣如齊遂賀齊惠公立得臣㑹葬文公累數之者偕行也非相為介也冬十月子卒文公夫人出姜生惡及視二妃敬嬴生宣公敬嬴嬖而私事公子遂故遂弑惡及視而立宣公書曰子卒諱之也不日失之也不名既葬也夫人姜氏歸于齊季孫行父如齊莒弑其君庶其庶其生太子僕及季佗愛季佗而黜僕且多行無禮於國僕因國人而弑之故稱國以弑春秋集解卷六
