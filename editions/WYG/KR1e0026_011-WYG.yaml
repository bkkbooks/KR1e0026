body:
  text: 春秋集解卷十一宋蘇轍􅁧定公元年春王三月晉人執宋仲㡬于京師夏六月癸亥公之喪至自乾侯戊辰公即位秋七月癸巳𦵏我君昭公九月大雩立煬宮冬十月隕霜殺菽僖三十三年書隕霜不殺草今指言殺菽何也於其不殺而言草言其廣也於其殺而言菽言其所害也二年春王正月夏五月壬辰雉門及兩觀災秋楚人伐呉冬十月新作雉門及兩觀三年春王正月公如晉至河乃復二月辛卯邾子穿卒夏四月秋𦵏邾莊公冬仲孫何忌及邾子盟于㧞四年春王二月癸巳陳侯呉卒三月公會劉子晉侯宋公蔡侯衞侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯把伯小邾子齊國夏于召陵侵楚夏四月庚辰蔡公孫姓帥師滅沈以沈子嘉歸殺之五月公及諸侯盟于臯鼬把伯成卒于會六月𦵏陳惠公許遷于容城秋七月公至自會劉卷卒𦵏把悼公楚人圍蔡晉士鞅䘙孔圉帥師伐鮮虞昭十二年楚滅陳蔡晉人不救而伐鮮虞稱晉以夷之今晉既不為蔡伐楚楚人圍蔡亦弗之救而於其伐鮮虞也稱晉士鞅衞孔圉何也晉雖有棄諸侯之罪而蔡無國滅之禍輕重之異也𦵏劉文公冬十有一月庚午蔡侯以呉子及楚人戰于柏舉楚師敗績楚囊瓦出奔鄭楚平王殺伍奢其子員奔呉為呉行人囊瓦殺郤宛伯氏之族出伯州犂之孫嚭為呉太宰以謀楚故蔡侯因之以乞師囊瓦帥師禦之呉稱子而囊瓦稱人何也呉以夷故不得稱人又不可言以呉特稱呉子書實也囊瓦以貪致宼不能死而出奔稱人賤之也庚辰呉入郢五年春王三月辛亥朔日有食之夏歸粟于蔡於越入呉六月丙申季孫意如卒秋七月壬子叔孫不敢卒冬晉士鞅帥師圍鮮虞六年春王正月癸亥鄭游速帥師滅許以許男斯歸二月公侵鄭公至自侵鄭夏季孫斯仲孫何忌如晉秋晉人執宋行人樂祁犂冬城中城季孫斯仲孫忌帥師圍鄆七年春王正月夏四月秋齊侯鄭伯盟于鹹齊人執衞行人北宮結以侵衞齊侯衞侯盟于沙大雩齊國夏帥師伐我西鄙九月大雩冬十月八年春王正月公侵齊公至自侵齊二月公侵齊三月公至自侵齊曹伯露卒夏齊國夏帥師伐我西鄙公會晉師于瓦公至自瓦秋七月戊辰陳侯柳卒晉士鞅帥師侵鄭遂侵衞𦵏曹靖公九月𦵏陳懷公季孫斯仲孫何忌帥師侵衞冬衞侯鄭伯盟于曲濮從祀先公從順也先公閔僖也逆祀則稱躋僖公順祀則稱先公何也徧祀先公也於是陽虎欲去三桓故順祀而祈焉虎之謀去三桓亂也而其順祀則禮也春秋善惡不以相及各書其實而已盜竊寶玉大弓陽虎將殺季孫斯不勝而出取寶玉大弓寶玉大弓魯之分器也所謂夏后氏之璜與封父之繁弱是時陽虎以鄆讙龜陰叛奔齊十年侯犯以郈叛及昭十三年南蒯以費叛皆以賤不書其書竊寶玉大弓何也分器重於地分器重於地者賤貨而貴命也九年春王正月夏四月戊申鄭伯蠆卒得寶玉大弓六月𦵏鄭獻公秋齊侯衞侯次于五氏齊侯伐晉夷儀克之衞侯會之五氏言次而不言伐齊衞告次而不告伐也秦伯卒冬𦵏秦哀公十年春王三月及齊平夏公會齊侯于夾谷公至自夾谷晉趙鞅帥師圍衞齊人來歸鄆讙龜陰田叔孫州仇仲孫何忌帥師圍郈秋叔孫州仇仲孫何忌帥師圍郈宋樂大心出奔曹樂祁犂死於晉晉人止其喪以求成于宋宋使樂大心盟晉且逆祁犂之喪大心辭偽有疾祁犂之子溷譖而逐之宋公子地出奔陳冬齊侯衞侯鄭游速會于安甫叔孫州仇如齊宋公之弟辰暨仲佗石彄出奔陳十有一年春宋公之弟辰及仲佗石彄公子地自陳入于蕭以叛夏四月秋宋樂大心自曹入于蕭冬及鄭平叔還如鄭涖盟十有二年春薛伯定卒夏𦵏薛襄公叔孫州仇帥師墮郈衞公孟彄帥師伐曹季孫斯仲孫何忌帥師墮費秋大雩冬十月癸亥公會齊侯盟于黄十有一月丙寅朔日有食之公至自黄十有二月公圍成公至自圍成仲由為季氏宰將墮三都於是叔孫氏墮郈季氏將墮費公山不狃叔孫輒帥費人以襲魯公與三子入于季氏之宮登武子之臺費人攻之入及公側仲尼命申句湏樂頎下伐之費人比二子奔齊遂墮費將墮成公斂處父不欲公圍之弗克不書三人之亂皆陪臣也或曰昭公將去季氏而失國孔子為魯而墮三都亦㡬於亂孔子之為是何也曰昭公之去季氏而失國失民故也魯君之失民與三桓之得民乆矣故將以治魯而不得三桓不可為也能得三桓而道之以禮樂猶可治也孔子為魯而仲由為季氏宰三家從之矣其不從者其家臣也家臣未能得魯衆也雖其不從不能為患此孔子之所以墮三都而無疑也十有三年春齊侯衞侯次于垂葭夏築蛇淵囿大蒐于比蒲衞公孟彄帥師伐曹秋晉趙鞅入于晉陽以叛冬晉荀寅士吉射入于朝歌以叛晉趙鞅歸于晉薛弑其君比十有四年春衞公叔戌來奔衞趙陽出奔宋二月辛巳楚公子結陳公孫佗人帥師滅頓以頓子牂歸夏衞北宮結來奔五月於越敗呉于檇李呉子光卒公會齊侯衞侯于牽公至自會秋齊侯宋公會于洮天王使石尚來歸脤石尚天子之士也天子之士稱王人石尚之名以其接我特書也脤祭肉也禮助祭則受胙魯不助而歸之非禮也不然魯之助則微者也衞世子蒯聵出奔宋衞公孟彄出奔鄭宋公之弟辰自蕭來奔大蒐于比蒲邾子來會公城莒父及霄十有五年春王正月邾子來朝鼷䑕食郊牛牛死改卜牛二月辛丑楚子滅胡以胡子豹歸夏五月辛亥郊壬申公薨于髙寢鄭罕達帥師伐宋齊侯衞侯次于渠蒢邾子來奔喪秋七月壬申姒氏卒八月庚辰朔日有食之九月滕子來會𦵏丁巳𦵏我君定公雨不克𦵏戊午日下昃乃克𦵏辛巳𦵏定姒冬城漆春秋集解卷十一
