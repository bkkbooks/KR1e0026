  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0026_WYG_002-1a, image: WYG0148/WYG0148-0011a.png}
body:
  text: 春秋集解卷二宋蘇轍撰桓公元年春王正月公即位繼故不書即位正也先君不以其道終子弟不忍即位也繼故而言即位是與聞乎弑也先君不以其道終己正即位之道而即位是無恩乎先君也三月公會鄭伯于垂鄭伯以璧假許田許田所以易祊也以祊為未足而益之以璧耳曷為不言易諱之也言假有歸之道焉言易則已矣凡歸未有不受者也假未有不予者也鄭伯之使宛來歸祊也書歸書入魯鄭皆罪也其以璧假許田也書假而不書予祊之謀隱公為之矣桓因而成之非專其罪也夏四月丁未公及鄭伯盟于越秋大水冬十月二年春王正月戊申宋督弑其君與夷及其大夫孔父此弑其君與殺其大夫其言及何也由弑及之也華督殺孔父而取其妻公怒督懼遂弑殤公君子以督為有無君之心而後動於惡故先書弑其君公羊曰孔父字也其不名賢也諸侯不生名死猶名之大夫生名死而名正也孔父之死何賢而字乎且方名其君而字其臣禮乎滕子來朝滕嘗稱侯其稱子王所黜也三月公會齊侯陳侯鄭伯于稷以成宋亂成平也稷之會將以平宋亂也既而受賂立華氏故書其所以會春秋之會未有書其故者也會而書其故言非其實也襄三十年諸侯之大夫會于澶淵亦書曰宋災故言諸侯始以宋災為會既而無歸亦非其實也夏四月取郜大鼎于宋戊申納于大廟郜鼎華氏之賂也華氏之賂為不可受矣而又納之大廟甚之也秋七月杞侯來朝蔡侯鄭伯會于鄧九月入杞公及戎盟于唐冬公至自唐凡公行反而告廟則書不然則否特相會徃來稱地自參以上則徃稱地來稱會會衆詞也一出而二事則或致其前或致其後致其重者也隱公之不至何也將不終為君不以告也三年春正月公會齊侯于嬴夏齊侯衞侯胥命于蒲胥命者約言而不盟也有以相命故不可以言會未嘗㰱血故不可以言盟六月公會杞侯于郕秋七月壬辰朔日有食之既公子翬如齊逆女九月齊侯送姜氏于讙公會齊侯于讙夫人姜氏至自齊冬齊侯使其弟年來聘有年四年春正月公狩于郎夏天王使宰渠伯糾來聘五年春正月甲戌己丑陳侯鮑卒夏齊侯鄭伯如紀天王使仍叔之子來聘葬陳桓公城祝丘秋蔡人衞人陳人從王伐鄭鄭世為周卿士王貳於虢故周鄭交惡王以諸侯伐鄭不言王及蔡人衞人陳人伐鄭君臣之詞也不言王以蔡人衞人陳人伐鄭諸侯之師王之所得用也於是鄭人及王戰于繻葛大敗王師射王中肩不言戰王者無敵莫敢與之戰也不言敗諱之也大雩旱也得雨曰雩不得雨曰旱曷為以大言之雩上帝也天子雩于上帝諸侯雩于山川百神魯以周公得祭上帝謂之大雩言大於諸侯也左氏曰凡祀啓蟄而郊龍見而雩始殺而嘗閉蟄而烝過則書秋大雩書不時也夫龍見而雩常祀也旱雩而以常祀言之失之矣螽冬州公如曹六年春正月寔來夏四月公會紀侯于成秋八月壬午大閱蔡人殺陳佗九月丁夘子同生子同桓之適長也以太子生之禮舉之故書公羊曰喜有正也喜有正所以病桓也然則非病桓將不書乎穀梁曰疑故志之然則非疑將不志乎冬紀侯來朝七年春二月己亥焚咸丘夏穀伯綏來朝鄧侯吾離來朝八年春正月己夘烝天王使家父來聘夏五月丁丑烝秋伐邾冬十月雨雪祭公來遂逆王后于紀祭公王之三公也王將逆后于紀而使魯主之故祭公自魯如紀不稱使謀昏也遂繼事之詞也大夫出疆有以二事出者有以一事出而專繼事者其書皆曰遂得失則視其實而已祭公自魯逆王后公子遂如周及晉皆以二事出者也公子結媵而及齊宋盟專繼事者也女在國稱女此其稱王后何也王者無外命之則成矣九年春紀季姜歸于京師劉夏逆王后于齊不書其歸此何以書魯為之主也既曰王后矣此其稱紀季姜何也自紀稱之也父母之於子雖有天子后猶曰吾季姜夏四月秋七月冬曹伯使其世子射姑來朝諸侯相朝正也有故而使世子攝事畏大國也蓋禮之變也十年春王正月庚申曹伯終生卒夏五月葬曹桓公秋公會衞侯于桃丘弗遇衞侯與公為會於桃丘既而背之與齊鄭來戰故書曰弗遇過在衞也冬十有二月丙午齊侯衞侯鄭伯來戰于郎六年北戎伐齊鄭太子忽救齊大敗戎師於是諸侯之大夫戍齊齊人餼之使魯為之班魯以周班後鄭鄭忽以其有功也怒故以齊衞來戰于郎不稱侵伐而稱來戰無詞也鄭雖主兵而先書齊衞猶以周班正之也十有一年春正月齊人衞人鄭人盟于惡曹夏五月癸未鄭伯寤生卒秋七月葬鄭莊公九月宋人執鄭祭仲突歸于鄭鄭忽出奔衞祭仲有寵於鄭莊公為公娶鄧曼生忽故祭仲立之宋雍氏女於鄭莊公曰雍姞生突雍氏有寵於宋莊公故誘祭仲而執之曰不立突將死祭仲與宋人盟以突歸而立之書曰宋人執鄭祭仲而繼之以突之入與忽之出仲以出君易死罪之也突之不稱公子何也將以為君非復臣也其曰歸于鄭何也凡反其國無難曰歸有難曰入無難而内不喜曰復歸有難而内不喜曰復入復者厭之之詞也突從祭仲以歸于鄭則無難矣鄭忽未逾年之君也未逾年之君稱子不稱子何也不能君也忽之為太子也齊侯將妻之忽辭人問其故忽曰自求多福在我而已大國何為及其敗戎師也齊侯又請妻之固辭或問之曰無事於齊吾猶不敢而况以師昏乎故其立也國人不附大國不援以至於出奔蓋未嘗君也故不稱子公羊曰祭仲何以不名賢其知權也忽何以名春秋伯子男一也詞無所貶夫以出君為知權亂之道也故祭仲名也非字也且方名二君而可以字其臣乎嫡子稱子禰先君也庶子不得稱子不敢禰先君也非伯子男之謂也且雖伯子男其可一乎柔會宋公陳侯蔡叔盟于折公會宋公于夫鍾冬十有二月公會宋公于闞十有二年春正月夏六月壬寅公會杞侯莒子盟于曲池秋七月丁亥公會宋公燕人盟于穀丘八月壬辰陳侯躍卒公會宋公于虛冬十有一月公會宋公于龜丙戌公會鄭伯盟于武父鄭伯突也突簒其兄而立春秋以君許之何也諸侯雖以簒得苟能和其民而親諸侯内外君之則以君書之不沒其實也雖君而實簒雖簒而實君皆因其實而已不然則否不能君也衞州吁陳佗是也丙戌衞侯晉卒十有二月及鄭師伐宋丁未戰于宋宋多責賂於鄭公五為會以平之宋公不可故與鄭師伐宋伐而言戰伐而又戰也不言及宋人戰何也以國地則及宋人戰也十有三年春二月公會紀侯鄭伯已已及齊侯宋公衞侯燕人戰齊師宋師衞師燕師敗績此戰猶以鄭故也先言會而後言日既會而後戰會戰異日也不言所戰後也衞宣公未葬其子出會諸侯非禮也燕戰則稱人敗則稱師何也與齊宋序戰皆稱爵敗皆稱衆也三月葬衞宣公夏大水秋七月冬十月十有四年春正月公會鄭伯于曹無冰夏五鄭伯使其弟語來盟凡外大夫來盟於魯内大夫涖盟於他國皆盟其君也大夫而盟其君禮乎禮諸侯不親盟於他國大夫即盟於他國非敵君也雖盟其君可也秋八月壬申御廩災乙亥嘗御廩者粢盛之所藏也壬申災而乙亥嘗書不害也然而周之八月非嘗之時也公羊曰御廩災不如勿嘗而已矣災而為害則不嘗若災而不害而可以勿嘗乎事之不可以意推者當從史左氏史也冬十有二月丁巳齊侯祿父卒宋人以齊人蔡人衞人陳人伐鄭凡師能左右之曰以齊桓晉文之用諸侯不言以何也公用之也諸侯而用諸侯則言以私用之也用之以公則人自用也用之以私則我用之也十有五年春二月天王使家父來求車三月乙未天王崩夏四月己巳葬齊僖公五月鄭伯突出奔蔡諸侯不生名突之名失地也突將殺祭仲不克而出諸侯之出奔必有出之者矣言其出不言其出之者何也君實有國而出於臣臣雖有罪而君至於失國自取之也然則弑君何以稱臣弑君之罪重於出君也鄭世子忽復歸于鄭忽嘗為君矣其出也稱鄭忽其復歸也稱鄭世子忽何也於其出言其不能君也於其復歸言其所恃以反國者惟世子也舍是無足以歸者矣突既出則忽之歸無難矣然而鄭人之所不喜也許叔入于許鄭莊公之入許也使許大夫百里奉許叔以居許東偏使其大夫公孫獲居許西偏許叔因鄭亂以入於許猶有鄭難焉故曰入叔之不稱公子將為君也不名而字無與爭國者也凡將君而非爭者皆字許叔蔡季是也公會齊侯于艾邾人牟人葛人來朝秋九月鄭伯突入于櫟稱入忽在内難之也公羊曰何以不言忽之出奔忽之為君微也祭仲存則存矣祭仲亡則亡矣夫突入于櫟未入于鄭忽未嘗奔也而何以書之冬十有一月公會宋公衛侯陳侯于袲伐鄭地而後伐既會而後伐也穀梁曰疑詞也非其疑也蓋以為伐突以正忽也夫突在櫟不在鄭伐鄭非伐突也乃所以救突也公羊穀梁之妄若是者衆矣不可勝非也故各非其一而已十有六年春正月公會宋公蔡侯衞侯于曹夏四月公會宋公衞侯陳侯蔡侯伐鄭秋七月公至自伐鄭冬城向十有一月衞侯朔出奔齊衞宣公烝於夷姜生伋子屬之右公子為之娶於齊而宣公取之生壽及朔屬壽於左公子宣姜與朔構伋子使齊盜殺之幷及壽子故二公子怨惠公而立公子黔牟惠公出奔十有七年春正月丙辰公會齊侯紀侯盟于黄二月丙午公會邾儀父盟于趡夏五月丙午及齊師戰于奚六月丁丑蔡侯封人卒秋八月蔡季自陳歸于蔡季之不稱公子將為君也不名而字無與爭國者也自陳陳奉之也癸巳葬蔡桓侯葬未有不稱公者此其稱侯何也傳失之也或曰周衰諸侯不請謚於天子故葬則稱公蔡桓之稱侯請之天子也夫諸侯既没不請於天子而稱公非禮也然則魯君生而稱公諸侯之大夫皆稱公子亦非禮乎臣子之於君極其尊而稱之禮也諸侯葬而魯徃會從其臣子而稱公亦可謂禮矣及宋人衞人伐邾冬十月朔日有食之十有八年春王正月公會齊侯于濼公與夫人姜氏遂如齊非禮也濼之會公實與姜氏行其不言公與夫人姜氏會齊侯于濼夫人不會也穀梁曰夫人伉也夫人雖伉而與於會可以不書乎雖不伉而不與於會其可書乎其不言及何也及上下之詞也與不相屬也所以惡夫人也夏四月丙子公薨于齊齊侯通於姜氏使彭生戕公不言戕諱之也公薨不地故也此其言齊何也在外不可不言也丁酉公之喪至自齊秋七月冬十有二月己丑葬我君桓公春秋集解卷二
