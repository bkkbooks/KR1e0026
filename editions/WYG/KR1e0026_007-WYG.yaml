body:
  text: 春秋集解卷七宋蘇轍撰宣公元年春王正月公即位公子遂如齊逆女三月遂以夫人婦姜至自齊遂之不氏因前也曰婦有姑之辭也或稱婦姜或稱婦姜氏文有詳略非義之所在也夏季孫行父如齊晉放其大夫胥甲父于衛文十二年秦晉戰于河曲秦人夜戒晉師㬰駢曰使者目動而言肆懼我也薄諸河必敗之胥甲趙穿當軍門呼曰死傷未收而棄之不惠也不待期而薄人於險無勇也乃止於是晉人討不用命者放胥甲于衛胥甲趙穿其罪一也放甲而舎穿穿盾之族也故稱國以放言政之不一也公會齊侯于平州公以簒立故使季孫行父納賂于齊而求會焉以定其位公子遂如齊六月齊人取濟西田秋邾子來朝楚子鄭人侵陳遂侵宋晉趙盾帥師救陳左傳曰救陳宋獨稱救陳闕文也宋公陳侯衛侯曹伯會晉師于棐林伐鄭不曰會晉趙盾而曰會晋師言兵會非好會也雖以諸侯會大夫無譏也冬晉趙穿帥師侵崇崇秦之與國晉將求成于秦故侵崇秦弗與成於是晉靈公侈故不競於秦楚晉人宋人伐鄭二年春王二月壬子宋華元帥師及鄭公子歸生帥師戰于大棘宋師敗績獲宋華元秦師伐晉夏晉人宋人衛人陳人侵鄭秋九月乙丑晉趙盾弑其君夷臯晉靈不君趙盾驟諫公欲殺之盾將出奔而趙穿弑公於桃園盾未出山而復晉史書曰趙盾弑其君盾曰不然史曰子為正卿亡不越境反不討賊非子而誰盾曰於乎我之懷矣自詒伊慼其我之謂矣孔子聞之曰惜也越境則免或曰弑君大惡也不越境微過也盾不弑君而以不越境加之弑君之名可乎曰亡而越境則盾誠亡也反而討賊則盾誠不知謀也今亡而不越境反而不討賊孰知非盾之偽亡而使穿弑君者如是而以穿居弑君之名則盾計得矣弑君之罪而容以計免乎故曰於晉趙盾見忠臣之至於許世子止見孝子之至此二者所以為教也非以為法也然則今將舉弑君之罪而誅盾也可乎曰舉弑君之罪以責盾則可舉弑君之罪以誅盾則不可昔者郭解之客為解殺人而解不知公孫𢎞曰解布衣為任俠行權以睚眦殺人解雖不知甚於知之遂以誅解其所以責解者善矣然至以誅解則非法也孟子曰今有禦人於國門之外而饋以道則其罪死以不義取之於民而饋以道則受於孔子以不義取之於民者猶禦也則孔子亦受禦歟夫以不義取之於民者猶禦也克類至義之盡也充類至義之盡而名之曰禦則可以禦誅之則不可故春秋以弑君責盾而非以弑君誅盾也不以弑君責盾則以不義取之於民者非禦也以弑君誅盾則以不義取之於民者皆死也而可乎故曰此所以為教也非以為法也司馬遷有言為人君父而不通春秋之義者必蒙首惡之名為人臣子而不通春秋之義者必陷簒弑之罪其實皆以善為之而不知其義被之空言而不敢辭夫不通禮義之㫖至於君不君臣不臣父不父子不子此四行者天下之大過也以天下之大過予之受而不敢辭故春秋者禮義之大宗也遷意在是也冬十月乙亥天王崩三年春王正月郊牛之口傷改卜牛牛死乃不郊猶三望牛不曰牲未卜日也正月尚可以養牛牛死當復改卜而遂不郊非禮也不郊而望亦非禮也天王未葬而郊不為非禮者不以王事廢天事也葬匡王楚子伐陸渾之戎夏楚人侵鄭秋赤狄侵齊宋師圍曹冬十月丙戌鄭伯蘭卒葬鄭穆公四年春王正月公及齊侯平莒及郯莒人不肯公伐莒取向秦伯稻卒夏六月乙酉鄭公子歸生弑其君夷楚人獻黿於鄭靈公公子宋與歸生將見宋食􅃌動以示歸生曰他日我如此必甞異味及入宰夫將解黿相視而笑公問之以告及食大夫黿召宋而弗與也宋怒染􅃌於鼎甞之而出公怒欲殺之宋與歸生謀先歸生曰畜老猶憚殺之而况君乎反譖歸生懼而從之故書曰鄭公子歸生弑其君夷首弑君者宋也舎宋而書歸生何也曰弑君之禍成於二人二人不可并書將書其一而已宋首弑君其罪不疑書其不疑則歸生可得免也歸生之罪成於不得已疑若可免也弑君之罪不可以疑免書其疑者而其不疑者可知也宋襄公使邾文公用鄫子于次且之社春秋書邾人而不及宋亦猶是也赤狄侵齊秋公如齊公至自齊冬楚子伐鄭五年春公如齊夏公至自齊秋九月齊高固來逆叔姬叔孫得臣卒冬齊高固及子叔姬來楚人伐鄭六年春晉趙盾衛孫免侵陳夏四月秋八月螽冬十月七年春衛侯使孫良夫來盟夏公會齊侯伐萊秋公至自伐萊大旱冬公會晉侯宋公衛侯鄭伯曹伯于黑壤八年春公至自會夏六月公子遂如齊至黃乃復辛巳有事于太廟仲遂卒于垂壬午猶繹萬入去籥繹者祭之明日所以賔尸也萬舞也籥管也卿佐之喪可以廢繹矣不知廢繹而於舞之入也去其有聲者使弗聞而已非禮也戊子夫人嬴氏薨晉師白狄伐秦楚人滅舒蓼秋七月甲子日有食之既冬十月己丑葬我小君敬嬴雨不克葬庚寅日中而克葬禮葬既有日不為雨止故送者不避􅂗潦而士喪禮有潦車載簑笠今雨而不克葬則失於無備也左氏曰禮卜葬先遠日避不懷也卜而先遠禮也葬之日有進無退而可以為雨止乎城平陽楚師伐陳九年春王正月公如齊公至自齊夏仲孫蔑如京師齊侯伐萊秋取根牟八月滕子卒九月晉侯宋公衛侯鄭伯曹伯會于扈晉荀林父帥師伐陳辛酉晉侯黑臀卒于扈冬十月癸酉衛侯鄭卒宋人圍滕楚子伐鄭晉郤缺帥師救鄭陳殺其大夫洩冶陳靈公與孔寜儀行父通於夏姬衷其衵服以戲于朝洩冶諫二子謀殺之公不禁故稱國以殺殺無罪也洩冶强諫以死疑若可賢也而不免於名何也正言於昏亂以陷於死雖無罪而君子不貴也十年春公如齊公至自齊齊人歸我濟西田夏四月丙辰日有食之己巳齊侯元卒齊崔氏出奔衛齊崔杼有寵於惠公高國畏其偪也公卒而逐之書曰齊崔氏以其族奔也公羊曰稱崔氏譏世卿也春秋之際大夫世而弑其君者獨崔氏乎而獨譏之也文王之治岐也仕者世禄詩曰凡周之士不顯亦世三代之世臣國之所賴以為固也而春秋何譏耶苟失其政竪刁陽虎皆足以為亂曾非世臣也苟失其迹而譏之則過矣公如齊五月公至自齊癸巳陳夏徴舒弑其君平國徴舒陳大夫夏姬之子也靈公之惡甚矣其稱臣以弑何也罪不及民也君以無道加其臣子臣子以弑報之而得不名是臣得讎君而子得讎父也故罪不及民者皆稱臣子陳徵舒蔡般是也要之失民而後不稱臣子以民為重也六月宋師伐滕公孫歸父如齊葬齊惠公晉人宋人衛人曹人伐鄭秋天王使王季子來聘公孫歸父帥師伐邾取繹大水季孫行父如齊冬公孫歸父如齊齊侯使國佐來聘饑楚子伐鄭十有一年春王正月夏楚子陳侯鄭伯盟于辰陵公孫歸父會齊人伐莒秋晉侯會狄于欑函冬十月楚人殺陳夏徵舒陳靈公之死也孔寜儀行父奔楚故楚子伐陳謂陳人無動吾將有討於少西氏遂入陳殺夏徵舒因縣陳申叔時使於齊而反謂楚子曰牽牛以蹊人之田而奪之牛蹊者信有罪矣而奪之牛罰已重矣諸侯之從也曰討有罪也今縣陳貪其富也以討召諸侯而以貪歸之無乃不可乎楚子曰善哉吾未之聞也於是乃復封陳蓋楚子入陳而殺徵舒今先書楚人殺陳夏徵舒而後書楚子入陳納公孫寜儀行父于陳何也楚子之殺徵舒也既以滅陳而縣之矣非入也及申叔時諫而復封陳然後得為入也孔子以其終復封陳也故不言其滅以其始甞滅之也故先書殺徵舒而後書入稱人衆詞也以其討有罪也稱子偏詞也以其入人之國而納有罪也丁亥楚子入陳納公孫寜儀行父于陳十有二年春葬陳靈公楚子圍鄭夏六月乙夘晉荀林父帥師及楚子戰于邲晉師敗績秋七月冬十有二月戊寅楚子滅蕭晉人宋人衛人曹人同盟于清丘晉原縠宋華椒衛孔達曹人同盟于清丘曰䘏病討貳既而陳即楚宋伐之而衛人救陳楚伐宋而晉人不救故卿不書不實其言也宋師伐陳衛人救陳十有三年春齊師伐莒夏楚子伐宋秋螽冬晉殺其大夫先縠邲之役晉三帥皆不欲戰先縠不可故敗誅之固其宜也然先縠先軫之後先軫晉之舊勲也晉人誅縠而盡滅其族稱國以殺言刑之過也十有四年春衛殺其大夫孔達十二年陳貳于楚宋以清丘之盟故伐陳衛孔達曰先君有約言焉不可不救也若大國討我則死之衛人救陳既而晉人來討於是殺孔達以説孔達則有罪矣而衛人用其言以干盟主故稱國以殺罪累上也夏五月壬申曹伯壽卒晉侯伐鄭秋九月楚子圍宋葬曹文公冬公孫歸父會齊侯于榖十有五年春公孫歸父會楚子于宋夏五月宋人及楚人平楚子圍宋九月而不解宋人告急于晉晉人不救乃使華元夜入楚師登子反之床曰寡君使元以病告敝邑易子而食析骸而㸑雖然城下之盟有以國斃不能從也去三十里惟命是聽子反懼與之盟而告王退三十里而與之盟宋將亡而華元能存之楚可取宋而子反能舎之疑若可賢者其稱人何也華元竊入楚師而劫其將子反將而劫於敵雖有善君子不貴也易曰師出以律否臧凶故書平而不書盟為要盟也宋之平與夾谷之會其不書盟一也六月癸夘晉師滅赤狄潞氏以潞子嬰兒歸秦人伐晉王札子殺召伯毛伯秋螽仲孫蔑會齊高固于無婁初税畝井田之法一夫百畝十畝為公田今履其餘畝復十税一故哀公曰二吾猶不足其失蓋始於此冬蝝生螽子生於冬不能為害而書者亦幸之也饑十有六年春王正月晉人滅赤狄甲氏及留吁夏成周宣榭火秋郯伯姬來歸冬大有年十有七年春王正月庚子許男錫我卒丁未蔡侯申卒夏葬許昭公葬蔡文公六月癸夘日有食之己未公會晉侯衛侯曹伯邾子同盟于斷道晉郤克聘于齊齊頃公帷婦人觀而笑之郤克怒請伐之會于斷道討貳也齊侯使高國晏弱蔡朝南郭偃會晉人辭之書曰同盟齊貳也秋公至自會冬十有一月壬午公弟叔􅆄卒十有八年春晉侯衛世子臧伐齊公伐杞夏四月秋七月邾人戕鄫子于鄫甲戌楚子旅卒楚莊王也呉楚之君卒而不葬葬必從其臣子之詞呉楚之僭不可信也公孫歸父如晉冬十月壬戌公薨于路寢歸父還自晉至笙遂奔齊歸父襄仲之子有寵於公欲去三桓以張公室與公謀而聘於晉欲以晉人去之公薨季文子言於朝曰使我殺適立庶以失大援者仲也夫遂逐東門氏歸父還及笙壇帷復命於介既復命袒括髪三踊而出遂奔齊大夫出聘未有言其還者奔未有言其至者書曰歸父還自晉至笙遂奔齊蓋善其得禮也春秋集解卷七
