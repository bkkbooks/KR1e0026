body:
  text: 春秋集解卷五宋蘇轍撰僖公元年春王正月齊師宋師曹師次于聶北救郉夏六月郉遷于夷儀諸侯救郉郉人潰出奔師師遂逐狄人具郉器用而遷之師無私焉故書曰郉遷于夷儀言自遷也齊師宋師曹師城郉城郉之師則救郉之師也何以復序善城郉也秋七月戊辰夫人姜氏薨于夷齊人以歸夫人薨不地在外則地哀姜孫于邾齊人取而殺之于夷以其尸歸不言殺諱之也君子以齊人之殺哀姜為已甚矣女子從人者也雖其有罪非齊之所治也楚人伐鄭荆自此改號曰楚交通中國春秋始以人書之然猶君臣同辭凡書其君臣者皆特書也八月公㑹齊侯宋公鄭伯曹伯邾人于檉九月公敗邾師于􅅯冬十月壬午公子友帥師敗莒師于酈獲莒拏莒人責慶父之賂季友敗之而獲莒子之弟拏特書喜之也凡徒執曰執兵執曰獲諸侯戰而死曰滅生曰獲大夫生死皆曰獲十有二月丁巳夫人氏之喪至自齊齊人殺哀姜而以其尸歸絶之於魯僖公請而塟之不稱姜氏何也文姜之孫也不稱姜氏以為義當絶齊也哀姜之死齊既自絶之矣是以不稱姜也然則曷為不於其薨塟焉去之薨塟盡禮雖欲去之而不可得故於其至焉去之也二年春王正月城楚丘狄之入衞也衛之遺民男女七百三十人益之以共滕之民立戴公以廬于漕桓公使公子無虧戍之歸公祭服乘馬凡為國之用戴公卒文公立桓公於是帥諸侯城楚丘而封之不言諸侯魯後至不及序也不言城衞衞未遷也夏五月辛巳葬我小君哀姜虞師晉師滅下陽晉侯以屈產之乘與垂棘之璧請假道於虞以伐虢虞公許之宫之竒諌不聽遂滅夏陽晉主兵而先書虞賄故也夏陽虢之邑也非國而曰滅夏陽滅而虢亡也五年晉遂滅虢因以滅虞則其滅虢也無難矣故於夏陽以滅言之而五年不書滅虢盖歸罪於虞也秋九月齊侯宋公江人黄人盟于貫冬十月不雨楚人侵鄭三年春王正月不雨夏四月不雨僖公憂民勤雨故每於首月必書不雨徐人取舒舒附庸之國也徐取之以自屬故不言滅春秋書徐皆不稱人以其夷故也稱徐人羡文也六月雨秋齊侯宋公江人黄人㑹于陽榖冬公子友如齊涖盟楚人伐鄭四年春王正月公㑹齊侯宋公陳侯衞侯鄭伯許男曹伯侵蔡蔡潰遂伐楚次于陘二年楚人侵鄭三年楚人伐鄭齊桓公㑹諸侯于陽榖為鄭謀楚將以諸侯伐之而未行桓公與蔡姬乘舟于囿蕩公公懼禁之不可公怒歸之而未絶也蔡人嫁之至是因諸侯之師以侵蔡蔡潰遂伐楚責包茅之不入故蔡曰侵楚曰伐然蔡小國也以齊侵之不待諸侯諸侯之師實為楚動而春秋書其迹先侵蔡而後伐楚若以蔡故勤諸侯言私欲之害也凡民迯其上曰潰在上曰迯楚人方强齊將綏之以徳故次于陘以待之既而楚屈完來求盟因而許之雖有諸侯之衆而不用盖伯者之師求以服人而已非若後世必以戰勝為功也二十八年晉楚戰于城濮晉文公退三舍避楚楚成得臣從之不已而後戰方其退三舍而楚還則文公亦將不戰矣由此觀之桓文之於用兵皆求服人而不求必勝也夏許男新臣卒卒于師也不言卒于師師未訖事也曹伯廬之卒于會也書曰卒師訖事也穀梁曰諸侯死于國不地死于外地死于師而不地内桓師也雖内桓師使既訖事不可不地也楚屈完來盟于師盟于召陵屈完楚大夫也楚子使完如師以觀齊完見齊之盛因而求盟故不稱使書曰楚屈完來盟于師制在完也於是齊桓退舍以禮楚故復書曰盟于召陵言非陘也齊人執陳轅濤􅂗齊師之退也濤􅂗不欲其道於陳與鄭申侯謀而告於齊侯請出於東方觀兵於東夷循海而歸齊侯許之申侯見曰師老矣若出於東方而遇敵懼不可用也若出於陳鄭之間共其資糧屝屨其可也齊侯悦與之虎牢而執濤􅂗書曰齊人執轅濤􅂗執有罪也秋及江人黄人伐陳八月公至自伐楚葬許穆公冬十有二月公孫茲帥師㑹齊人宋人衞人鄭人許人曹人侵陳伐陳侵陳皆討濤􅂗之不忠也前曰伐當其罪也後曰侵己甚也五年春晉侯殺其世子申生晉侯之嬖曰驪姬生奚齊將立之故殺其世子申生父子兄弟人之大倫也而至於相殺則人倫廢矣故凡殺世子母弟必稱其君且世子母弟之親非君殺之無能殺之者矣是以責之君也杞伯姬來朝其子僖公之母成風在焉則伯姬歸寜禮也諸侯之子代父而朝禮之變也弱而從其母以朝非禮也夏公孫兹如牟公及齊侯宋公陳侯衞侯鄭伯許男曹伯㑹王世子于首止惠王世子鄭也王以惠后故將廢鄭而立帶故齊桓帥諸侯而㑹之以定其位世子不名而殊㑹尊之也首止之㑹非王志也帥諸侯以定世子為義也然而諸侯不以王命而㑹世子世子不以王命而出㑹諸侯衰世之事也秋八月諸侯盟于首止稱諸侯明王世子不盟也將君天下不敢與之盟也鄭伯逃歸不盟王惡齊桓之定世子鄭也使周公召鄭伯曰吾撫女以從楚輔之以晉可以少安鄭伯喜于王命而畏齊故迯歸不盟雖有王命而棄大信以從不義書曰迯歸罪之也楚人滅弦弦子奔黄九月戊申朔日有食之冬晉人執虞公晉侯復假道於虞以伐虢宫之竒復諌不聼遂滅虢師還館於虞襲虞滅之執虞公及其大夫井伯不言晉之滅虞虞自滅也秦之取梁也書曰梁亡而不及秦以為梁自亡也晉之滅虞也書曰晉人執虞公而不言晉人滅虞以為虞自滅而晉人執其君耳虞公之不名未通也凡執諸侯稱侯以執伯討也稱人以執私執之也執諸侯重於執大夫故得以斥其君也六年春王正月夏公㑹齊侯宋公陳侯衞侯曹伯伐鄭圍新城新城新密也鄭所以不時城也齊桓聲其罪以告諸侯故書曰新城秋楚人圍許諸侯遂救許義見上圍新城冬公至自伐鄭七年春齊人伐鄭夏小邾子來朝鄭殺其大夫申侯陳轅濤􅂗怨鄭申侯之反已於召陵也故勸之城其賜邑遂譖諸鄭伯曰美城其賜邑將以叛也及齊人伐鄭鄭殺申侯以説故稱國以殺言非其罪也秋七月公㑹齊侯宋公陳世子款鄭世子華盟于寗母曹伯班卒公子友如齊冬葬曹昭公八年春王正月公㑹王人齊侯宋公衞侯許男曹伯陳世子款盟于洮七年惠王崩世子鄭以叔帶之難懼不立不發喪而告難于齊於是盟于洮王人與盟謀王室也鄭伯乞盟寗母之㑹鄭世子華言於齊侯請去洩氏孔氏子人氏三族而以鄭為内臣桓公將許之管仲曰君若綏之以徳加之以訓辭而帥諸侯以討鄭鄭將覆亡之不暇豈敢不懼若總其罪人以臨之鄭有辭矣何懼君其勿許鄭必受盟齊侯辭焉於是鄭伯請盟書曰鄭伯乞盟而不列于㑹以其迯盟賤之也賤鄭所以貴齊也夏狄伐晉秋七月禘于太廟用致夫人禘三年大祭也太廟周公廟也記曰季夏六月以禘禮祀周公於太廟七月非其時也夫人哀姜也其死也魯人以夫人終之矣然以其有罪而戮於齊不列於太廟者八年矣至是始致其主於太廟也夫稱夫人而不列於太廟非禮也舉罪人而致之太廟亦非禮也其曰用者不宜用者也特言夫人何也哀姜得罪於宗廟而戮死於齊且無後於國則既自絶於魯矣雖不以夫人終之可也而魯人以夫人終之立之主而祔之廟雖欲不致之太廟不可得矣故於其致也特稱夫人言其所以得致者惟為夫人故也公羊曰譏以妾為妻也榖梁曰譏以妾母為夫人也此皆意之之辭也求其説而不得是以為此辭也冬十有二月丁未天王崩九年春王三月丁丑宋公御説卒夏公㑹宰周公齊侯宋子衞侯鄭伯許男曹伯于葵丘周公以三公兼冡宰故曰宰周公宋桓公未葬而襄公㑹諸侯非禮也凡在喪公侯曰子秋七月乙酉伯姫卒九月戊辰諸侯盟于葵丘甲子晉侯佹諸卒冬晉里克殺其君之子奚齊晉侯殺適立庶晉人不順故里克殺奚齊然奚齊則無罪不稱弑其君而稱殺其君之子何也未葬也春秋於子般子野之卒皆以未葬故名未塟而名則未君也未可以稱君而繫之其君著其將君也榖梁曰其君之子云者國人不子也豈有其君之子而國人不子者乎且國人之不子奚齊與卓均耳不子奚齊而君卓可乎十年春王正月公如齊狄滅温温子奔衞晉里克弑其君卓及其大夫荀息卓奚齊之弟也荀息奚齊之傅也晉侯疾召荀息曰以是藐諸孤辱在大夫其若之何對曰臣竭其股肱之力繼之以忠貞其濟君之靈也不濟則以死繼之及里克殺奚齊荀息將死之人曰不如立卓子而輔之荀息立卓以葬里克殺卓于朝荀息死之卓之稱君既葬且逾年也夏齊侯許男伐北戎晉殺其大夫里克秋七月冬大雨雪十有一年春晉殺其大夫㔻鄭父㔻鄭里克之黨也惠公既殺里克㔻鄭言於秦伯請出晉君而納重耳鄭則有罪矣然鄭之謀由殺里克致之也故稱國以殺言君亦過也夏公及夫人姜氏㑹齊侯于陽榖秋八月大雩冬楚人伐黄十有二年春王三月庚午日有食之夏楚人滅黄秋七月冬十有二月丁丑陳侯杵臼卒十有三年春狄侵衞夏四月葬陳宣公公㑹齊侯宋公陳侯衞侯鄭伯許男曹伯于鹹秋九月大雩冬公子友如齊十有四年春諸侯城緣陵夏六月季姬及鄫子遇于防使鄫子來朝鄫季姫也季姬來寧公怒鄫子之不朝也止而絶其昏故遇于防而使來朝非禮也不稱鄫季姫絶也然春秋未有書季姫歸于鄫者或者鄫子之未為君也歸之歟亦未有書鄫季姬來者來而遂止之則絶也絶則非寧也亦未有書鄫季姫來歸者季姫非出於鄫也故皆不書盖諱之也公羊榖梁曰非使來朝也使來請己也夫女子也而㑹諸侯使來請己事盖有至此者乎秋八月辛卯沙鹿崩狄侵鄭冬蔡侯􅆄卒十有五年春王正月公如齊楚人伐徐三月公㑹齊侯宋公陳侯衞侯鄭伯許男曹伯盟于牡丘遂次于匡公孫敖帥師及諸侯之大夫救徐牡丘之諸侯也諸侯次于匡而遣大夫救徐義與聶北之師同夏五月日有食之秋七月齊師曹師伐厲厲楚之與國伐厲所以救徐也八月螽九月公至自㑹季姫歸于鄫鄫子既朝乃使婦之故書曰歸于鄫己卯晦震夷伯之廟冬宋人伐曹楚人敗徐于婁林十有一月壬戌晉侯及秦伯戰于韓獲晉侯晉侯之入秦伯之力也既入而背其賂晉饑秦輸之粟秦饑晉閉之糴故秦伯伐晉曲在晉也諸侯之獲皆言以歸書獲晉侯而不言以歸罪之也凡諸侯失地則名晉侯之不名何也出而國有君者於出名之出而國無君者於歸名之要之皆失地也而國無君者有歸之道焉耳是以不名其出也不言晉師敗績舉君獲為重也十有六年春王正月戊申朔隕石于宋五隕星也莊五年書曰星隕如雨見星之隕而不見其為石也今曰隕石于宋五見其為石而不見星之隕也是月六鷁退飛過宋都鷁大鳥也退飛逆飛也書失常也書是月言非戊申也何以不日失之也三月壬申公子季友卒凡公子以伯仲字者於其卒皆稱其字以兄弟錄之也季友仲遂叔􅆄是也惟牙以罪死故曰公子牙卒絶不以兄弟數也夏四月丙申鄫季姫卒秋七月甲子公孫兹卒冬十有二月公㑹齊侯宋公陳侯䘙侯鄭伯許男邢侯曹伯于淮十有七年春齊人徐人伐英氏英氏楚之屬也故齊人為徐伐之以報婁林之役徐之稱人何也與齊人序稱齊人不可不稱徐人也夏滅項魯滅之也公羊榖梁曰此齊滅之也曷為不言齊滅之為桓公諱也桓公盖嘗滅譚遂矣春秋未嘗為之諱也且為桓公諱而以魯滅項書可乎秋夫人姜氏㑹齊侯于卞公㑹諸侯於淮而内滅項齊人以為討而止公聲姜以公故㑹齊侯于卞其情可也而禮則不可九月公至自㑹不言齊人之執諱之也猶有諸侯之事焉可以言㑹也冬十有二月乙亥齊侯小白卒齊桓公無適子長衞姫生無􅉻少衞姫生惠公鄭姫生孝公葛嬴生昭公密姫生懿公宋華子生公子雍公與管仲屬孝公於宋襄公以為太子易牙與寺人貂有􅃂於桓公及衞共姫公許之立無虧管仲死五公子皆求立十月乙亥桓公卒易牙與寺人貂因内寵以作亂而立無虧孝公奔宋十二月己亥赴辛巳夜殯書從赴志亂也十有八年春王正月宋公曹伯衞人邾人伐齊納孝公也不言納與入孝公齊之世子也言納與入嫌於不當立也夏師救齊五月戊寅宋師及齊師戰于甗齊師敗績救無虧也齊人殺無虧以説宋將立孝公不勝四公子之徒遂與宋師戰狄救齊救四公子也秋八月丁亥葬齊桓公冬邢人狄人伐衞狄之稱人與邢人序稱邢人不可不稱狄人也十有九年春王三月宋人執滕子嬰齊稱人以執以其私執之也嬰齊之名失國也夏六月宋公曹人邾人盟于曹南鄫子㑹盟于邾鄫子不及曹南之盟諸侯既罷而㑹之於邾故書曰㑹盟于邾己酉邾人執鄫子用之宋公使邾文公用鄫子于次睢之社欲以屬東夷然春秋書邾人而不及宋何也諸侯之尊善惡可以專之非人之所得使也邾以諸侯而聽命於宋以行不義是以專罪邾也若宋公之罪則不待貶而見矣秋宋人圍曹衞人伐邢冬㑹陳人蔡人楚人鄭人盟于齊宋公凌虐諸侯故陳穆公請修好焉以無忘齊桓之徳盟于齊齊與盟也梁亡梁伯好土功亟城而不能處也民罷而不堪則曰某宼將至乃溝公宫曰秦將襲我民懼而潰秦遂取梁故書曰梁亡言其自亡非秦亡之也二十年春新作南門夏郜子來朝五月乙巳西宫災鄭人入滑秋齊人狄人盟于邢冬楚人伐隨二十有一年春狄侵衞宋人齊人楚人盟于鹿上齊桓沒中國無伯故宋為鹿上之盟以求諸侯于楚夏大旱秋宋公楚子陳侯蔡侯鄭伯許男曹伯㑹于盂執宋公以伐宋楚方稱人以執宋公故特書楚子楚子實執宋公其序諸侯以執之何也宋公不度徳量力而争諸侯諸侯之所不予也故序諸侯以執且不予楚子專執中國也楚未嘗與諸侯㑹盟及齊之盟序蔡下鄭上盖未能服諸侯故以爵序至是而諸侯服之故遂先諸侯冬公伐邾楚人使宜申來獻㨗不稱楚子非特書也特書宜申以其接我也不稱宋㨗不予楚之㨗中國也十有二月癸丑公㑹諸侯盟于薄釋宋公盂之諸侯也凡諸侯見執而不失國者於歸名之書曰某侯某歸于某此其不名而言釋何也以為執之釋之皆在諸侯也若是而尚可以求諸侯乎所以深咎宋公也且書曰歸于某而名則自名也書曰釋宋公而名則以諸侯名之也皆諸侯也而可以相名乎二十有二年春公伐邾取須句須句小國而邾滅之取而反其君焉禮也不書須句之滅與其君之復弱不能自通也夏宋公衞侯許男滕子伐鄭秋八月丁未及邾人戰于升陘邾以須句故侵我公卑邾不設備而禦之我師敗績邾人獲公胄不稱公不書敗皆諱之也莊九年乾時之戰不稱公而書敗何也敗不切公也升陘之敗公㡬於獲故諱敗也冬十有一月己巳朔宋公及楚人戰于泓宋師敗績宋公被執見釋而猶争諸侯楚以夷狄而干諸夏故泓之戰雖曲在宋而春秋辭無所予公羊曰言日言朔正也春秋辭繁而不殺者正也楚人渉泓而未畢濟有司請擊之宋公曰不可君子不厄人既濟而未畢陳有司請擊之宋公曰不可君子不鼓不成列巳陳而鼓之宋師大敗雖文王之戰不過此也夫文王豈以一日不鼓不成列而為文王哉其所以服人者遠矣以宋之徳而為是則亦不知戰而已春秋何善焉二十有三年春齊侯伐宋圍緡齊不恤宋之敗而討其不與齊之盟譏之也夏五月庚寅宋公茲父卒秋楚人伐陳冬十有一月杞子卒杞嘗稱侯且稱伯矣稱子絀也二十有四年春王正月夏狄伐鄭二十年鄭人入滑是歲復伐之王使如鄭請滑鄭不聽命王怒使頽叔桃子出狄師以伐鄭秋七月冬天王出居于鄭王徳狄之伐鄭也以狄女為后叔帶通之王詘狄后頽叔桃子奉叔帶以狄師攻王王御士將禦之王曰先后其謂我何寜使諸侯圖之遂出適鄭處于汜天子無出其曰出王自出也其曰居于鄭諸侯不敢有其地也晉侯夷吾卒二十三年九月晉惠公卒而懷公立是年正月秦伯納文公三月殺懷公皆實以告文公既定位乃告惠公之喪故不書月與日志亂也二十有五年春王正月丙午衞侯燬滅邢夏四月癸酉衞侯燬卒宋蕩伯姫來逆婦伯姬魯女嫁于宋蕩氏母為子逆婦非禮也曰婦由姑言之也宋殺其大夫稱國以殺而不名其大夫殺無罪也公羊曰宋三世無大夫三世内娶也使宋誠三世内娶乎禮未有不臣妻之父者從而不名其大夫是許之也榖梁曰不書名姓以其在祖之位尊之也春秋豈為孔氏作歟而尊其祖以及其大夫也秋楚人圍陳納頓子于頓頓子廹於陳而出故楚人圍陳所以納頓子也言納則内有弗受者也葬衞文公冬十有二月癸亥公㑹衞子莒慶盟于洮衞成公稱子喪未逾年也莒慶莒大夫也以其釋酈之怨特書嘉之也二十有六年春王正月己未公㑹莒子衞寗速盟于向齊人侵我西鄙公追齊師至酅弗及侵曰人追曰師不可言公追齊人故也夏齊人伐我北鄙衞人伐齊公子遂如楚乞師乞重辭也師出不正反戰不必勝故以乞言之齊再伐魯故乞師於楚齊雖有罪而魯乞師於夷狄以伐中國亦譏之也秋楚人滅䕫以䕫子歸䕫楚之同姓而不名楚子非特書故也以為人楚子甚於名楚子也冬楚人伐宋圍緡晉文公之出也過宋宋襄公厚遇之及其反國宋遂叛楚即晉故楚人伐之公以楚師伐齊取榖公至自伐齊二十有七年春杞子來朝夏六月庚寅齊侯昭卒秋八月乙未葬齊孝公乙巳公子遂帥師入杞冬楚人陳侯蔡侯鄭伯許男圍宋楚人楚子也稱人非特書也公羊曰為其執宋公故終僖之篇貶之也夫楚子之執宋公稱子以執伯討也而謂其終身不免則過矣况終僖之篇於楚子何有哉十有二月甲戌公㑹諸侯盟于宋公與楚有好故於其圍宋而㑹之宋方見圍書曰盟于宋不嫌其與盟也二十有八年春晉侯侵曹晉侯伐衞文公之出也曹衞皆不禮焉及楚子圍宋宋人告急狐偃曰楚始得曹而新昏於衞若伐曹衞楚必救之則宋免矣於是假道於䘙以侵曹衞人不許還自南河濟侵曹伐衞曹以不禮為過故曰侵衞以不假道為罪故曰伐齊桓侵蔡蔡潰而遂伐楚故一稱齊侯今侵曹與伐衞異道故再稱晉侯公子買戍衞不卒戍刺之周禮有三刺之法故内殺大夫皆曰刺諱之也買始為楚戍衞楚人救衞不克公懼於晉殺買以説而以不卒戍告楚刺未有書其故者書其故言非其實也楚人救衞三月丙午晉侯入曹執曹伯畀宋人晉侯以不禮故私討於曹既執曹伯又以予宋人皆非義也其稱晉侯以伯討書之何也書晉侯為入曹也既言晉侯入曹故不可復言晉人執曹伯非以伯討許之也曹伯失地而不名何也出而國無君也夏四月己巳晉侯齊師宋師秦師及楚人戰于城濮楚師敗績楚殺其大夫得臣晉文公自是始得諸侯故宋公齊國歸父崔夭秦小子憗皆稱師言衆與之也文公既克曹衞楚子入居于申使申叔去榖使得臣去宋得臣使伯棼請戰楚子怒之而不止也及其從晉師也晉師退三舍避之楚衆欲止得臣不可故敗得臣則有罪矣而楚以一敗殺之故稱國以殺言君亦過也得臣之不氏以特書故也衞侯出奔楚衞侯失地而不名何也其出也使元咺奉叔武以受盟國猶其國也五月癸丑公㑹晉侯齊侯宋公蔡侯鄭伯衞子莒子盟于踐土晉既克楚合諸侯于踐土王因往勞享之而䇿命之為侯伯使王子虎㑹諸侯于王庭虎不書不與盟也不書王之來㑹天子而從諸侯諱之也衞侯使叔武攝事以受盟故稱子以未成君之名稱之言非王命也陳侯如㑹公朝于王所六月衞侯鄭自楚復歸于衞名其復歸終見其失地也元咺叔武非難其歸者也而國人不喜故書曰復歸衞元咺出奔晉衞侯不信叔武先期而入公子􅞰犬華仲前驅叔武將沐聞君至喜捉髪走出前驅射而殺之故元咺出奔訟之於晉陳侯款卒秋杞伯姫來公子遂如齊冬公㑹晉侯齊侯宋公蔡侯鄭伯陳子莒子邾子秦人于溫天王狩于河陽晉文公將帥諸侯以尊事天子而不敢合諸侯於京師故召王於河陽而以諸侯見其情則順而禮則逆也仲尼曰以臣召君不可以訓然而其情不可不察也故書曰天王狩于河陽使若廵狩然尊周且以全晉也然則踐土之不言王狩何也踐土之㑹王自往耳非晉之罪也故為王諱之而足矣溫之㑹晉之罪也晉雖有罪而其情則順故為王諱之為晉解之而後可也壬申公朝于王所晉人執衞侯歸之于京師衞元咺自晉復歸于衞衞侯執則咺之歸無難矣然咺之訟衞以不寧國人之所不喜也故稱復歸諸侯遂圍許溫之諸侯也許比再㑹不至故因㑹討之曹伯襄復歸于曹遂㑹諸侯圍許襄之名亦終見其失國也其言遂㑹諸侯圍許則襄猶未歸也其言復歸于曹既許之也二十九年春介葛盧來介小國也其名夷也不言朝公在㑹也公至自圍許夏六月㑹王人晉人宋人齊人陳人蔡人秦人盟于翟泉公㑹王子虎晉狐偃宋公孫固齊國歸父陳轅濤􅂗秦小子憖盟于翟泉㝷踐土之盟且謀伐鄭也公不書諱與大夫盟也卿不書罪之也在禮卿不㑹公侯㑹伯子男可也秋大雨雹冬介葛盧來春不見公故冬復來不言朝不能朝也三十年春王正月夏狄侵齊秋衞殺其大夫元咺及公子瑕王釋衞侯衞侯使周歂冶厪殺元咺及瑕而後入稱國以殺咺瑕雖有罪而君亦有過也瑕立逾年矣其不稱君何也為君非瑕志也是以先元咺而後瑕言事之在咺也衞侯鄭歸于衞元咺既死則衞侯之歸無難矣不言復歸衞自是少安也晉人秦人圍鄭晉侯之出也鄭文公亦不禮焉故晉侯秦伯圍鄭其稱人何也專以其私討人罪之也介人侵蕭冬天王使宰周公來聘公子遂如京師遂如晉内曰如外曰使皆君命也所謂以二事出者也三十有一年春取濟西田曹田也曷為不言取曹濟西田晉人執曹伯而以其田分諸侯非吾取之曹也公子遂如晉夏四月四卜郊不從乃免牲猶三望禮諸侯不祭天地魯以周公故孟春祈榖于上帝所謂啟蟄而郊也常以二月卜三月上辛不吉則卜中辛不吉則卜下辛三卜而不從則不郊矣四月非時也四卜非禮也榖梁曰以十二月下辛卜正月上辛不從則以正月下辛卜二月上辛不從則以二月下辛卜三月上辛然則不待啟蟄而郊禮乎禮帝牛必在滌三月稷牛惟具牛卜日曰牲牲成而不郊則卜免牲不吉則不郊而已以為甞致之上帝弗敢專也猶者可已之辭也禮既郊而望望郊之細也不郊亦無望可也謂之望者國之所望山若川也魯之望三太山河海是歟秋七月冬杞伯姫來求婦狄圍衞十有二月衞遷于帝丘三十有二年春王正月夏四月己丑鄭伯㨗卒衞人侵狄秋衞人及狄盟冬十有二月己卯晉侯重耳卒三十有三年春王二月秦人入滑齊侯使國歸父來聘夏四月辛巳晉人及姜戎敗秦師于殽三十年秦晉圍鄭秦伯私與鄭盟使杞子逢孫楊孫戍之而還杞子自鄭導秦以襲鄭秦伯使孟明西乞白乙出師師及滑鄭商人弦髙遇之以君命犒師孟明曰鄭有備矣不可冀也滅滑而還晉先軫請擊之襄公在喪遂墨衰絰以出兵及姜戎要之於殽敗之其稱人何也文公之入秦之力也故雖穆公私與鄭盟而文公不問今襄公争小忿而忘大徳罪之也孟明不書非卿癸巳葬晉文公狄侵齊公伐邾取訾婁秋公子遂帥師伐邾晉人敗狄于箕冬十月公如齊十有二月公至自齊乙巳公薨于小寢隕霜不殺草李梅實晉人陳人鄭人伐許春秋集解卷五
