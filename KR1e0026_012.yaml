body:
  text: 春秋集解卷十二宋蘇轍撰哀公元年春王正月公即位楚子陳侯隨侯許男圍蔡定六年鄭滅許今復見者楚封之也鼷鼠食郊牛改卜牛夏四月辛巳郊秋齊侯衛侯伐晉冬仲孫何忌帥師伐邾二年春王二月季孫斯叔孫州仇仲孫何忌帥師伐邾取漷東田及沂西田癸巳叔孫州仇仲孫何忌及邾子盟于句繹三子伐邾邾人賂以沂漷之田乃受盟再序大夫季孫不盟也夏四月丙子衛侯元卒滕子來朝晉趙鞅帥師納衛世子蒯聵于戚定十四年蒯聵將殺南子不克而出靈公卒衛人將立蒯聵之弟郢郢乃立蒯聵之子輒夫蒯聵得罪于靈公而出則非世子矣其以世子書之何也以為靈公之卒衛人嘗立郢郢立則蒯聵非世子雖拒之可也衛人廢蒯聵而立輒則蒯聵猶世子也何也蒯聵廢則輒不當立輒立則蒯聵不廢靈公廢之而衛人立其子以成之雖欲不以世子名之可乎然則以世子名之何為而可曰不幸而立輒則輒當辭辭而不獲則致國乎蒯聵如是而後可子路問於孔子曰衛君待子而為政子將奚先曰必也正名乎名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罰不中刑罰不中則民無所措手足故君子名之必可言也言之必可行也君子於其言無所苟而已矣若輒以世子之子立而拒世子蒯聵稱世子而不得立得為正名乎雖然世子不言納世子當立者也當立者無所事納矣稱世子而言納見其非世子而衛人以為世子耳秋八月甲戌晉趙鞅帥師及鄭罕達帥師戰于鐵鄭師敗績冬十月葬衛靈公十有一月蔡遷于州來蔡殺其大夫公子駟元年楚將遷蔡于江汝之間蔡於是請遷于吳書曰蔡遷于州來自遷也蔡請遷于吳既而悔之吳以師遷之故殺駟以說稱國以殺非其罪也三年春齊國夏衛石曼姑帥師圍戚曼姑為子圍父知其不義故推齊使為兵首從而書之罪之也夏四月甲午地震五月辛卯桓宮僖宮災季孫斯叔孫州仇帥師城啓陽宋樂髠帥師伐曹秋七月丙子季孫斯卒蔡人放其大夫公孫獵于吳冬十月癸卯秦伯卒叔孫州仇仲孫何忌帥師圍邾四年春王二月庚戌盜殺蔡侯申蔡公孫辰出奔吳葬秦惠公宋人執小邾子夏蔡殺其大夫公孫姓公孫霍當書蔡人殺其大夫不言人闕文也晉人執戎蠻子赤歸于楚楚人圍蠻氏蠻子赤奔晉楚人求之晉人執而子之晉主諸侯而為楚執其所滅罪之也僖二十八年晉侯入曹執曹伯卑宋人其不曰卑楚人而曰歸于楚何也曹非宋有而蠻子楚之所滅也城西郛六月辛丑亳社災亳社商社也周之滅商也以其社賜諸侯所謂亡國之社也亡國之社必屋故災也秋八月甲寅滕子結卒冬十有二月葬蔡昭公葬滕頃公五年春城毗夏齊侯伐宋晉趙鞅帥師伐衛秋九月癸酉齊侯杵臼卒冬叔還如齊閠月葬齊景公春秋不書閏月此其書閏何也喪事不數閏譏其以閏月葬也六年春城邾瑕晉趙鞅帥師伐鮮虞吳伐陳夏齊國夏及髙張來奔齊景公無適子諸子鬻姒之子荼嬖公疾使國夏及髙張立荼置羣公子於萊公卒陳乞將立陽生乃與諸大夫謀先逐國髙叔還會吳于柤秋七月庚寅楚子軫卒齊陽生入于齊陳乞召陽生于魯而匿之其家諸大夫莫之知且荼猶在也故書入不稱公子將為君齊陳乞弒其君荼陳乞立陽生而遷荼於賴陽生使朱毛殺荼書曰陳乞弒其君乞雖不弒而弒君之禍乞為之也冬仲孫何忌帥師伐邾宋向巢帥師伐曹七年春宋皇瑗帥師侵鄭晉魏曼多帥師侵衛夏公會吳于鄫秋公伐邾八月己酉入邾以邾子益來魯入邾以邾子益來而不言滅何也邾大夫茅夷馮保於茅請救於吳明年吳為之伐魯魯復邾子故不言滅邾既滅矣幸而得復故邾雖無君而於出名之在外曰以歸在內曰以來內外之别也宋人圍曹冬鄭駟𢎞帥師救曹八年春王正月宋公入曹以曹伯陽歸此滅曹也其不言滅何也曹伯陽好田弋曹之鄙人公孫彊獲白鴈而獻之且言田弋之說說之因訪政事大說之彊言霸說於曹伯曹伯從之乃背晉而奸宋宋人伐之晉人不救書曰宋公入曹而不書滅言自滅也猶虞之滅言晉人執虞公而不言滅也吳伐我不言西鄙而直言伐我兵加于國都也於是為城下之盟而還不書諱之也夏齊人取歡及闡齊侯之在魯也季康子以其妹妻之即位而逆之季魴侯通焉女言其情弗敢與也齊侯怒故取歡及闡歸邾子益于邾齊侯以季姬故請師於吳將以伐魯故懼而歸邾子秋七月冬十有二月癸亥把伯過卒齊人歸歡及闡魯歸季姬于齊故齊人歸二邑不言來歸歸邑而不遣使也九年春王二月葬把僖公宋皇瑗帥師取鄭師于雍丘夏楚人伐陳秋宋公伐鄭冬十月十年春王二月邾子益來奔八年魯歸益于邾益為無道吳討而囚之使其大夫奉其太子革以為政故出公會吳伐齊會夷狄以伐中國惡莫甚焉三月戊戌齊侯陽生卒八年齊侯請師于吳將以伐魯既而季姬有寵乃辭吳師吳子怒反與公伐齊齊人殺其君以說而以疾赴春秋從而書之猶鄭髠頑也夏宋人伐鄭晉趙鞅帥師侵齊五月公至自伐齊葬齊悼公衛公孟彄自齊歸于衛彄蒯聵之黨也靈公既沒則彄之歸無難矣薛伯夷卒秋葬薛惠公冬楚公子結帥師伐陳吳救陳十有一年春齊國書帥師伐我夏陳轅頗出奔鄭轅頗為司徒賦封田以嫁公女有餘以為已大器故國人逐之五月公會吳伐齊甲戌齊國書帥師及吳戰于艾陵齊師敗績獲齊國書戰不言公公會伐而不會戰也秋七月辛酉滕子虞母卒冬十有一月葬滕隱公衛世叔齊出奔宋齊初娶于宋子朝其娣嬖子朝出孔文子使齊出其妻而妻之齊置其初妻之娣於犂如二妻文子怒而奪其妻或淫於外州外州人奪之軒以獻耻是二者故出十有二年春用田賦丘賦之法因其田財通出馬一匹牛三頭今别其田及家財各為一賦故曰田賦譏重斂也夏五月甲辰孟子卒孟子昭公夫人吳女也不稱夫人姬氏諱娶同姓也不書葬不祔于廟也語曰公娶于吳為同姓謂之吳孟子然則孟子者魯人之所以號昭夫人也春秋因而書之耳公會吳于槖臯秋公會衛侯宋皇瑗于鄖宋向巢帥師伐鄭冬十有二月螽周之十二月夏之十月不當有螽蓋失閏也故季孫問於仲尼仲尼曰丘聞之火伏而後蟄者畢今火猶西流司歷過也十有三年春鄭罕達帥師取宋師于嵒夏許男成卒公會晉侯及吳子于黃池襄十年會于柤十四年會于向皆書曰魯會諸侯會吳于某以吳為會故也其餘非以吳為會則書吳與諸侯齒故戚之會吳以鄫故稱人黃池之會吳以晉侯故稱子不可言晉侯吳故也公羊曰吳稱子吳主會也穀梁曰進之也夫晉方主會而曰吳主會吳方凌虐小國而曰進之可乎然則以晉侯及吳子何也春秋有以邑相及有以大夫相及皆非義也猶以晉侯及吳子也楚公子申帥師伐陳於越入吳秋公至自會晉魏曼多帥師侵衛葬許元公九月螽冬十有一月有星孛于東方旦而孛見故不得其次也盜殺陳夏區夫稱盜微者也十有二月螽十有四年春西狩獲麟狩而不地為獲麟書略之也麟仁獸也出非其時孔子以自况也故春秋終焉然則春秋始於隱公而終於哀公何也自周之衰天下三變而春秋舉其中焉耳其始也雖幽厲失道王室昏亂而禮樂征伐猶出於天子諸侯畏周之威不敢肆也雖春秋將何施焉及其中也平王東遷而周室不競諸侯自為政周道陵遲夷於列國逮隱之世習以成俗不可改矣然而文武成康之德猶在民未忘周也故齊桓晉文相繼而起莫不秉大義以尊周室會盟征伐以王命為首諸侯順之者存逆之者亡雖齊晉秦楚之强義之所在天下豫之義之所去天下叛之世雖無王而其法猶在也故孔子作春秋推王法以繩不義知其猶可以此治也及其終也定哀以來齊晉既衰政出於大夫繼之以吳越荆蠻之衆橫行於中國以勢力相吞滅禮義無所復施刑政無所復加雖欲舉王法以繩之而諸侯習於凶亂不可告語風俗靡然日入戰國是以春秋終焉由此觀之則春秋起於五伯之始而止於戰國之初隱哀適其時耳孔子曰禮樂征伐自諸侯出十世希不失矣自大夫出五世希不失矣自隱至昭而逐於季氏凡十世自宣至定而制於陽虎凡五世蓋自隱以來諸侯始專而五伯之形成獲麟之歲齊田常弒簡公自是以專齊其後二十八年韓趙魏自是以分晉而戰國之形成左丘明傳春秋止於知伯之亡古之達者蓋知之歟孟子曰王者之迹熄而詩亡詩亡然後春秋作夫二雅終於幽王而春秋作於平王蓋與變風止於陳靈陳靈之後六十餘年而獲麟變風之所不刺則春秋之所不書也春秋集解卷十二
