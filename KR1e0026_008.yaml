body:
  text: 春秋集解卷八宋蘇轍撰成公元年春王正月公即位二月辛酉葬我君宣公無冰三月作丘甲夏臧孫許及晉侯盟于赤棘秋王師敗績于茅戎晉侯使瑕嘉平戎於王劉康公徼戎將伐之叔服曰背盟而欺大國此必敗不聽遂伐之敗績于徐吾氏書曰王師敗績于茅戎言自敗也桓五年王伐鄭鄭人大敗王師射王中肩書伐而不書敗蓋諱之也若茅戎之敗非自敗也則亦書王師伐茅戎可也以為背盟而欺大國此自敗之道而非人敗之也此所以不諱敗也冬十月二年春齊侯伐我北鄙夏四月丙戌衛孫良夫帥師及齊師戰于新築衛師敗績六月癸酉季孫行父臧孫許叔孫僑如公孫嬰齊帥師會晉郤克衛孫良夫曹公子首及齊侯戰于鞍齊師敗績齊侯侵虐魯衛故魯衛乞師于晉以伐之魯四子皆卿故書諸侯用兵亦有卿皆行者不書略外也秋七月齊侯使國佐如師己酉及國佐盟于袁婁召陵之盟制在屈完故不稱使而書曰來盟于師盟于召陵袁婁之盟受命於君而可否在晉故書曰齊侯使國佐如師己酉及國佐盟于袁婁時師及齊國都退而與之盟也八月壬午宋公鮑卒庚寅衛侯速卒取汶陽田冬楚師鄭師侵衛十有一月公會楚公子嬰齊于蜀丙申公及楚人秦人宋人陳人衛人鄭人齊人曹人邾人薛人鄫人盟于蜀宣公季年求好于楚莊王二君卒而不果成公即位而受盟于晉又有鞍之師故楚公子嬰齊救齊悉師以行彭名御戎蔡景公為左許靈公為右侵衛及魯楚自城濮之敗不競於晉莊王雖入陳圍鄭及宋而未嘗合諸侯及蜀之盟諸侯從之者十有一國晉不敢爭自是與晉力爭諸侯其大夫列於聘會與齊晉齒春秋之法公不會大夫今公會嬰齊而不為公諱以為楚師之強不從則國病為國故許之也然其盟十一國也諸侯實畏晉而竊與之盟故嬰齊與秦右大夫説宋華元陳公孫寧衛孫良夫鄭公子去疾齊大夫皆稱人蓋諸侯背晉而竊與楚盟是以略之也其後四十二年晉趙武楚屈建合諸侯于宋然後晉楚之從得交相見又八年楚靈王求諸侯于晉晉人許之然後諸侯公得與楚盟耳蔡侯許男不列於會乘楚車也齊後於鄭非卿也三年春王正月公會晉侯宋公衛侯曹伯伐鄭辛亥葬衛穆公二月公至自伐鄭甲子新宫災三日哭乙亥葬宋文公夏公如晉鄭公子去疾帥師伐許公至自晉秋叔孫僑如帥師圍棘大雩晉郤克衛孫良夫伐牆咎如冬十有一月晉侯使荀庚來聘衛侯使孫良夫來聘丙午及荀庚盟丁未及孫良夫盟鄭伐許許恃楚而不事鄭鄭一歲再伐之書曰鄭伐許狄之也罪未至此或者書鄭人伐許而闕文耳四年春宋公使華元來聘三月壬申鄭伯堅卒杞伯來朝夏四月甲寅臧孫許卒公如晉葬鄭襄公秋公至自晉冬城鄆鄭伯伐許五年春王正月杞叔姬來歸仲孫蔑如宋夏叔孫僑如會晉荀首于穀梁山崩秋大水冬十有一月己酉天王崩十有二月己丑公會晉侯齊侯宋公衛侯鄭伯曹伯邾子杞伯同盟于蟲牢六年春王正月公至自會二月辛巳立武宫取鄟衛孫良夫帥師侵宋夏六月邾子來朝公孫嬰齊如晉壬申鄭伯費卒秋仲孫蔑叔孫僑如帥師侵宋楚公子嬰齊帥師伐鄭冬季孫行父如晉晉欒書帥師救鄭七年春王正月鼷鼠食郊牛角改卜牛鼷鼠又食其角乃免牛吳伐郯吳太伯之後其爵曰子其稱吳夷之也以其不通中國而用夷禮故也夏五月曹伯來朝不郊猶三望秋楚公子嬰齊帥師伐鄭公會晉侯齊侯宋公衛侯曹伯莒子邾子杞伯救鄭八月戊辰同盟于馬陵公至自會吳入州來冬大雩衛孫林父出奔晉八年春晉侯使韓穿來言汶陽之田歸之于齊汶陽之田本魯之侵地鞍之戰晉人使齊人歸之今以齊之服事晉也而使魯歸之非義也晉欒書帥師侵蔡公孫嬰齊如莒宋公使華元來聘夏宋公使公孫壽來納幣昏禮不稱主人此其稱使何也無以主昏詞窮也納幣不書此何以書公孫壽卿也春秋於伯姬之嫁書之最詳納幣致女以卿媵以非禮公羊榖梁不達也皆以為録伯姬失之矣晉殺其大夫趙同趙括趙嬰通于趙莊姬趙同趙括放之于齊莊姬譖之同括將為亂晉侯殺之稱國以殺殺無罪也秋七月天子使召伯來賜公命冬十月癸卯杞叔姬卒晉侯使士燮來聘叔孫僑如會晉士燮齊人邾人伐郯衛人來媵九年春王正月杞伯來逆叔姬之喪以歸公會晉侯齊侯宋公衛侯鄭伯曹伯莒子杞伯同盟于蒲公至自會二月伯姬歸于宋夏季孫行父如宋致女晉人來媵秋七月丙子齊侯無野卒晉人執鄭伯鄭伯既受盟於蒲楚人以重賂誘之復會楚公子成於鄧故晉人執之鄭伯背盟而二於楚稱人以執不得為伯討者晉方不信於諸侯有以致之也晉欒書帥師伐鄭冬十有一月葬齊頃公楚公子嬰齊帥師伐莒庚申莒潰楚人入鄆秦人白狄伐晉鄭人圍許晉人執鄭伯鄭公孫申曰我出師以圍許為將改立君者而舒晉使晉必歸君鄭人從之城中城十年春衛侯之弟黑背帥師侵鄭夏四月五卜郊不從乃不郊五月公會晉侯齊侯宋公衛侯曹伯伐鄭鄭人立世子髠頑欒書曰鄭人立君我執一人何益不如伐鄭歸其君以求成焉於是晉侯有疾立世子州蒲為君以會父在而稱晉侯失父子之道矣齊人來媵丙午晉侯獳卒秋七月公如晉公親弔晉喪非禮也晉人止公使送葬諸侯莫在魯人恥之故不書其葬諱之也冬十月十有一年春王三月公至自晉晉侯使郤犨來聘己丑及郤犨盟夏季孫行父如晉秋叔孫僑如如齊冬十月十有二年春周公出奔晉周公楚惡襄惠之逼且與伯輿爭政不勝而出王使劉子復之盟于鄄而入三日復出凡自周無出周公自出故書曰周公出奔晉夏公會晉侯衛侯于瑣澤秋晉人敗狄于交剛冬十月十有三年春晉侯使郤錡來乞師晉盟主也其用諸侯之師多矣未嘗乞師也今以列國之禮乞師善之也三月公如京師夏五月公自京師遂會晉侯齊侯宋公衛侯鄭伯曹伯邾人滕人伐秦公將與諸侯伐秦不敢過京師則朝焉非以朝行也不書公朝於京師而書公如京師若以朝行然何也方其未朝也未嘗有事是以置其情而書其迹內詞也且明君臣之禮也曹伯盧卒于師秋七月公至自伐秦冬葬曹宣公十有四年春王正月莒子朱卒夏衛孫林父自晉歸于衛晉侯使郤犫送孫林父于衛衛人復之故書曰自晉歸于衛秋叔孫僑如如齊逆女鄭公子喜帥師伐許九月僑如以夫人婦薑氏至自齊冬十月庚寅衛侯臧卒秦伯卒十有五年春王二月葬衛定公三月乙巳仲嬰齊卒癸丑公會晉侯衛侯鄭伯曹伯宋世子成齊國佐邾人同盟于戚晉侯執曹伯歸于京師十三年曹伯盧卒于師曹人使公子負芻守使公子欣時逆曹伯之喪負芻殺其世子而自立故晉侯會于戚以討之稱侯以執執有罪也歸之于京師禮也春秋之書執諸侯者多矣惟是為得禮於是諸侯將見欣時於王而立之欣時曰前志有之聖達節次守節下失節為君非吾節也雖不能聖敢失守乎遂逃奔宋故曹伯雖失國而不名曹無君故也公至自會夏六月宋公固卒楚子伐鄭秋八月庚辰葬宋共公宋華元出奔晉宋華元自晉歸于宋宋殺其大夫山宋魚石出奔楚宋華元為右師魚石為左師蕩澤為司馬華喜為司徒公孫師為司城向為人為大司寇鱗朱為少司寇向帶為大宰魚府為少宰蕩澤弱公室殺公子肥華元不能討乃出奔晉二華戴族也司城莊族也六官皆桓族也魚石將止華元魚府曰右師反必討是無桓氏也魚石曰彼多大勳國人與之不反懼桓氏之無祀於宋也乃止華元于河上請討許之乃反使華喜公孫師帥國人攻蕩氏殺子山魚石向為人鱗朱向帶魚府出舍於睢上華元止之不可遂奔楚華元之奔晉也未至而復其書曰華元出奔晉且書自晉歸於宋何也元將討山而知力之不能故奔奔而國人許之討故歸故其討山也雖其族人莫敢救之者故書曰宋華元出奔晉宋華元自晉歸于宋言其出入之正是以能討山也使元懷祿顧寵重於出奔則不能討山矣鄭子産為政豐卷將祭請田弗許卷退而徴役子産奔晉子皮止之歸而逐卷亦猶是也山之不氏背其宗也山實有罪而稱國以殺何也殺一大夫而國幾於亂非外也出者五人而獨稱魚石何也魚石卿也冬十有一月叔孫僑如會晉士燮齊高無咎宋華元衛孫林父鄭公子鰌邾人會吳于鍾離吳夷未嘗與中國會晉為之合諸侯而會之特書曰會吳于鍾離言以吳為會也許遷于葉十有六年春王正月雨木冰雨木冰五行木不曲直庶證常寒之罰也劉歆謂上陽施不下通下隂施不上通故雨而木為之冰唐遜皇帝以為木稼者是也木稼蓋木介爾此記異也夏四月辛未滕子卒鄭公子喜帥師侵宋六月丙寅朔日有食之晉侯使欒黶來乞師甲午晦晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績楚殺其大夫公子側鄢陵之敗也楚以一敗殺之故稱國以殺秋公會晉侯齊侯衛侯宋華元邾人于沙隨不見公鄢陵之戰公將會之叔孫僑如通於穆薑欲去季孟而取其室公待於壞隤設守而後行故不及於戰沙隨之會僑如使告於晉曰魯侯待於壞隤以待勝者故晉侯不見公桓十年公會衛侯於桃丘弗遇弗遇者不來會也不見公者來而不見也皆曲在外也公至自會公會尹子晉侯齊國佐邾人伐鄭曹伯歸自京師公子欣時既奔宋曹人請復曹伯于晉晉侯謂欣時反吾歸而君欣時反曹伯歸欣時置邑與卿而不出賢哉欣時之不取為君也曹雖失君而免於爭國之亂故書曰曹伯歸自京師言無所與爭者也凡諸侯之歸必書曰自某歸於某自某某有奉也歸於某求歸也其曰歸自京師者京師無奉而曹伯不求也非欣時之賢而能至此乎凡諸侯出而國無君者於歸名之曹伯之歸而不名者為欣時故也九月晉人執季孫行父舍之于苕丘公之會伐鄭也僑如復使告于晉曰季孫將背晉而事齊楚故晉人為之執行父范文子不可乃許魯平而赦季孫執內大夫而不於其國故復言其所而志之也冬十月乙亥叔孫僑如出奔齊十有二月乙丑季孫行父及晉郤犫盟于扈公至自會乙酉刺公子偃十有七年春衛北宫括帥師侵鄭夏公會尹子單子晉侯齊侯宋公衛侯曹伯邾人伐鄭六月乙酉同盟于柯陵書同盟鄭叛也齊晉之盛天子之大夫會而不盟尊周也柯陵之會尹子單子始與諸侯之盟自是習以為常非禮也秋公至自會齊高無咎出奔莒齊慶克通于聲孟子與婦人蒙衣乘輦以入鮑牽見之以告國佐國佐召慶克而謫之夫人怒公反自伐鄭夫人訴之曰高鮑將不納君而立公子角公不察刖鮑牽而逐高無咎無咎之子弱以盧叛九月辛丑用郊晉侯使荀罃來乞師冬公會單子晉侯宋公衛侯曹伯齊人邾人伐鄭十有一月公至自伐鄭壬申公孫嬰齊卒于貍脤嬰齊從於伐鄭還而道卒大夫卒不地其地在外也案下十二月丁巳朔則壬申非十一月失之矣十有二月丁巳朔日有食之邾子貜且卒晉殺其大夫郤錡郤犫郤至晉厲公侈反自鄢陵將盡去諸大夫而立其左右三郤族大而多怨謀先誅之郤氏知之郤錡欲攻公郤至止之皆靖以待命公使長魚僑殺之郤氏雖多怨於民而公殺之不以其罪故稱國以殺言刑之過也楚人滅舒庸十有八年春王正月晉殺其大夫胥童胥童厲公之嬖臣也與厲公謀殺三郤又執欒書中行偃將殺之公不許公使胥童為卿書偃既執厲公乃先殺童童雖道君為亂然書偃自是以弒君故稱國以殺庚申晉弒其君州蒲欒書中行偃實弒厲公然而厲公凌虐其臣民以及於禍故稱國以弒罪在君也齊殺其大夫國佐齊以高弱之叛使崔杼慶克圍盧國佐從諸侯圍鄭以難請而歸遂如盧師殺慶克以榖叛齊侯殺之佐雖以專殺叛君為罪然其咎發於慶克齊人右慶氏而殺佐故稱國以殺罪纍上也公如晉夏楚子鄭伯伐宋宋魚石復入于彭城楚子伐宋納魚石向為人鱗朱向帶魚府于彭城而封之不曰納魚石將言魚石之復入故也宣十一年楚子入陳納公孫寧儀行父于陳則何以不言入寧行父則有罪矣楚子討其罪人而納之疑若楚子之無罪也將正楚子之罪是以言納而不言其入也魚石之入不曰自楚何也言伐宋則自楚也不曰叛何也將以亂國非止叛也故宋魚石晉欒盈皆不曰叛公至自晉晉侯使士丐來聘秋杞伯來朝八月邾子來朝築鹿囿己丑公薨于路寢冬楚人鄭人侵宋晉侯使士魴來乞師十有二月仲孫蔑會晉侯宋公衛侯邾子齊崔杼同盟于虛朾丁未葬我君成公春秋集解卷八
