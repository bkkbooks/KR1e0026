body:
  text: 春秋集解春秋類提要臣等謹按春秋集解三十卷宋吕本中撰舊刻題吕祖謙誤也本中字居仁好問之子宋史本傳載靖康初官祠部員外郎紹興六年賜進士擢起居舍人八年遷中書舍人兼侍講權直學士院學者稱為東萊先生故趙希辨讀書附志稱是書為東萊先生撰後人因祖謙與朱子遊其名最著故亦稱為東萊先生而本中以詩擅名詩家多稱吕紫薇東萊之號稍隱遂移是書于祖謙不知陳振孫書録解題載是書固明云本中撰也朱彛尊經義考嘗辨正之惟以宋志作十二卷為疑然卷帙分合古今每易不獨此書為然况振孫言是書自三傳而下集諸儒之説不過陸氏兩孫氏兩劉氏蘇氏程氏許氏胡氏數家採擇頗精全無自已議論以此本考之亦合知舊刻誤題審矣惟宋志此書之外别出祖謙春秋集解三十卷稍為抵牾疑宋末刻本已析其原卷改題祖謙故相沿訛異史亦因之重出耳祖謙年譜備載所著諸書俱有年月而春秋集解獨不載固其確證不必更以他説疑也本中嘗撰江西宗派圖又有紫薇詩話皆盛行于世世多以文士目之而經學深邃乃如此林之竒從之受業復以其學授祖謙其淵源蓋有自矣乾隆四十三年五月恭校上總纂官臣紀盷臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書春秋集解引豫少而治春秋時人多師孫明復謂孔子作春秋略盡一時之事不復信史故盡棄三傳無所復取豫以為左丘明魯史也孔子本所據依以作春秋故事必以丘明為本杜預有言丘明授經於仲尼身為國史躬覽載籍其文緩其旨逺將令學者原始要終尋其枝葉究其所窮優而柔之使自求之饜而飫之使自趨之若江海之浸膏澤之潤渙然冰釋怡然理順斯言得之矣至於孔子之所豫奪則丘明容不明盡故當參以公穀啖趙諸人然昔之儒者各信其學是己而非人是以多窒而不通老子有言學不學復衆人之所過以輔萬物之自然而不敢為豫竊師此語故循理而言言無所係理之所至如水之流東西曲直勢不可常要之於通而已近歲王介甫以宰相解經行之於世至春秋漫不能通則詆以為斷爛朝報使天下士不得復學嗚呼孔子之遺言而凌滅至此非獨介甫之妄亦諸儒講解不明之過也故豫始自熙寧謫居高安覽諸家之説而裁之以義為集解十二卷及今十數年矣每有暇輒取觀焉得前説之非隨亦改之紹聖之初遷於南方至元符元年凡三易地最後卜居龍川之白雲橋杜門無事凡所改定亦復非一覽之灑然而笑蓋自謂無憾矣南荒士人無可與論説者顧謂子遜仰之彌高鑽之彌堅瞻之在前忽焉在後此孔子之不可及而顔子之所太息也而况於豫哉安知後世不復有能規豫過者其於昔之諸儒或庶幾焉耳汝能傳豫説使後生有聞焉者千歲之絶學儻在於是也二年閏九月八日志
