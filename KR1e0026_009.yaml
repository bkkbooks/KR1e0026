body:
  text: 春秋集解卷九宋蘇轍撰襄公元年春王正月公即位仲孫蔑會晉欒黶宋華元衛寧殖曹人莒人邾人滕人薛人圍宋彭城春秋書邑皆不繫其國以為邑不待國别而知也楚既取彭城以封魚石而猶書曰圍宋彭城者諸侯將取而歸之宋故致其意也或曰取宋之邑以封其叛臣不于楚得之故終繫之宋也夏晉韓厥帥師伐鄭仲孫蔑㑹齊崔杼曹人邾人杞人次于鄫諸侯之師會晉伐鄭故次于鄫以待之秋楚公子壬夫帥師侵宋九月辛酉天王崩邾子來朝冬衛侯使公孫剽來聘晉侯使荀罃來聘九月王崩十月訃未至於諸侯故雖不廢朝聘不為非禮二年春王正月葬簡王鄭師伐宋夏五月庚寅夫人姜氏薨六月庚辰鄭伯睔卒晉師宋師衛寧殖侵鄭鄭雖以叛中國為罪而伐其喪非禮也秋七月仲孫蔑㑹晉荀罃宋華元衛孫林父曹人邾人于戚己丑葬我小君齊姜叔孫豹如宋冬仲孫蔑會晉荀罃齊崔杼宋華元衛孫林父曹人邾人滕人薛人小邾人于戚遂城虎牢虎牢鄭地也鄭久從楚諸侯歲為之興師於是城虎牢以逼之明年而鄭受盟楚殺其大夫公子申申為右司馬多受小國之賂以逼子重子辛罪不至死而楚人殺之故稱國以殺三年春楚公子嬰齊帥師伐吳公如晉夏四月壬戌公及晉侯盟于長樗禮諸侯不親盟於他國成二年公如晉晉人使陽處父盟公三年雖改盟而猶盟於其國亦非禮也晉悼公修禮於諸侯故去其國而與公盟於長樗禮也公至自晉六月公㑹單子晉侯宋公衛侯鄭伯莒子邾子齊世子光已未同盟於雞澤陳侯使袁僑如會戊寅叔孫豹及諸侯之大夫及陳袁僑盟陳始亦從楚令尹子辛侵欲於小國故陳成公使袁僑求成於晉諸侯既盟而後袁僑至故復使大夫盟之殊及袁僑主盟袁僑也榖梁曰諸侯盟又大夫相與私盟大夫張也雞澤之會諸侯始失正矣夫諸侯不專敵袁僑而使大夫盟之禮也且悼公晉之明主而以為失正則過矣秋公至自會冬晉荀罃帥師伐許許事楚故也四年春王三月己酉陳侯午卒夏叔孫豹如晉秋七月戊子夫人姒氏薨葬陳成公八月辛亥葬我小君定姒冬公如晉陳人圍頓五年春公至自晉夏鄭伯使公子發來聘叔孫豹鄫世子巫如晉四年公如晉請屬鄫故叔孫豹覿鄫世子于晉以成屬鄫書曰叔孫豹鄫世子巫如晉比之魯大夫也仲孫蔑衛孫林父會吳于善道晉將會吳使魯衛先與吳會且告會期故特書會吳也秋大雩楚殺其大夫公子壬夫楚人討陳叛故曰由壬夫實貪欲焉殺之壬夫則有罪矣廢而勿用可也殺之過矣故稱國以殺公㑹晉侯宋公陳侯衛侯鄭伯曹伯莒子邾子滕子薛伯齊世子光吳人鄫人于戚成十五年會于鍾離是年會于善道十年會于柤十四年會于向皆特書會吳今戚之會會吳且命戌陳其不特書會吳為戌陳也吳之稱人與鄫皆列不可曰吳鄫人也鄫之復列於會魯人不利屬鄫也公至自會冬戌陳諸侯皆戌而獨書魯者受命于戚無命告也楚公子貞帥師伐陳公會晉侯宋公衛侯鄭伯曹伯齊世子光救陳十有二月公至自救陳辛未季孫行父卒六年春王三月壬午把伯姑容卒夏宋華弱來奔秋葬把桓公滕子來朝莒人滅鄫冬叔孫豹如邾季孫宿如晉十有二月齊侯滅萊七年春郯子來朝夏四月三卜郊不從乃免牲小邾子來朝城費秋季孫宿如衛八月螽冬十月衛侯使孫林父來聘壬戌及孫林父盟楚公子貞帥師圍陳十有二月公會晉侯宋公陳侯衛侯曹伯莒子邾子于鄬鄭伯髠頑如會未見諸侯丙戌卒于鄵鄭伯如會而名何也名其卒也鄭伯將會于鄬子駟相鄭伯不禮焉子駟使賊弒之而以瘧疾赴于諸侯然春秋從而信之何也君子不逆詐不億不信可欺以其方不可罔以非其道也彼以是告我我從而書之何病焉世之治也內有公卿大夫外有方伯連率是將有發其姦者然後從而治之何後焉故春秋者有待於史而後足非自以為史也世之為春秋而不信史則過矣陳侯逃歸楚人以陳叛故殺公子壬夫而亟討陳雖諸侯救陳而陳人不敢安也書曰逃歸以其背中國罪之也八年春王正月公如晉夏葬鄭僖公鄭人侵蔡獲蔡公子燮鄭子國子耳為晉侵蔡獲蔡公子燮鄭人皆喜子産曰小國無文德而有武功禍也晉楚爭鄭自此始矣自是晉楚之兵交至於鄭鄭人疾之書曰鄭人侵蔡無故犯楚以為國患罪之也季孫宿會晉侯鄭伯齊人宋人衛人邾人于邢丘晉悼公修文襄之業改命朝聘之數使諸侯之大夫聽命故公雖在晉而季孫宿與齊高厚宋向戌衛寧殖邾大夫會之鄭伯獻捷於會故親聽命大夫稱人衆詞也其朝聘之節儉而有禮衆之所安也公至自晉莒人伐我東鄙秋九月大雩冬楚公子貞帥帥伐鄭晉侯使士丐來聘九年春宋災夏季孫宿如晉五月辛酉夫人姜氏薨秋八月癸未葬我小君穆姜冬公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯把伯小邾子齊世子光伐鄭十有二月己亥同盟于戲楚子伐鄭十年春公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯把伯小邾子齊世子光會吳于柤特書會吳以吳為會故也夏五月甲午遂滅逼陽逼陽小國妘姓晉將取之以封宋向戌因會而滅國以封宋大夫非義也公至自會楚公子貞鄭公孫輒帥師伐宋晉師伐秦秋莒人伐我東鄙公會晉侯宋公衛侯曹伯莒子邾子齊世子光滕子薛伯把伯小邾子伐鄭齊世子光先至於師晉人使長於滕明年遂先莒禮小國之君當大國之卿齊世子之先子男禮之失也冬盜殺鄭公子騑公子發公孫輒戍鄭虎牢伐鄭之諸侯皆戍虎牢而獨書魯者受命於魯不復告也二年城虎牢不繫於鄭邑不待國别而知也諸侯既城虎牢非鄭地矣而繫之鄭諸侯將服鄭而歸之故致其意也鄭之虎牢宋之彭城一也楚公子貞帥師救鄭公至自伐鄭十有一年春王正月作三軍夏四月四卜郊不從乃不郊鄭公孫舍之帥師侵宋晉人再以諸侯伐鄭楚輒救之鄭人患之謀曰楚弱於晉晉不吾疾也晉疾楚將辟之何為而使晉師致死於我楚弗敢敵而後可固與也公孫舍之曰與宋為惡諸侯必至我從之盟楚師至吾又從之則晉怒甚矣晉能驟來楚將不能吾乃固與晉大夫說之於是侵宋以致晉師公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭秋七月己未同盟于亳城北公至自伐鄭楚子鄭伯伐宋晉師歸楚子伐鄭鄭伯逆之遂伐宋從公孫舍之之謀也公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯把伯小邾子伐鄭會於蕭魚鄭與會也八年鄭人侵蔡獲蔡公子燮自是晉楚爭鄭五年之間晉人四以諸侯伐鄭楚輒救之晉用知罃之謀未嘗與楚人戰至是楚不能應遂全師以服鄭於是鄭固與晉二十餘年楚不能爭雖城濮之克不能過也公至自會楚人執鄭行人良霄鄭使良霄告絶于楚楚人執之書曰楚人執鄭行人言非其罪也冬秦人伐晉十有二年春王三月莒人伐我東鄙圍台季孫宿帥師救台遂入鄆夏晉侯使士魴來聘秋九月吳子乘卒冬楚公子貞帥師侵宋公如晉十有三年春公至自晉夏取邿秋九月庚辰楚子審卒冬城防十有四年春王正月季孫宿叔老會晉士丐齊人宋人衛人鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人會吳于向十三年楚人大敗吳師吳告敗于晉晉人為之合諸侯以謀楚故特書曰會吳于向季孫宿叔老皆卿也卿為卿介非禮也齊崔杼宋華閲衛北宫括稱人惰也二月乙未朔日有食之夏四月叔孫豹會晉荀偃齊人宋人衛北宫括鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人伐秦己未衛侯出奔齊衛侯多行無禮於其國孫林父與寧殖出之而立公孫剽此出而國有君者也其曰衛侯而不名者何也魯使厚成叔弔于衛厚孫歸語臧武仲曰衛君其必歸乎有大叔儀以守有母弟鱄以出或撫其內或營其外能無歸乎又使臧孫唁衛侯衛侯與之言虐退而告人曰衛侯不得入矣子展子鮮聞之見臧孫與之言道臧孫曰衛侯其必入二子者或挽之或推之欲無入得乎故於其出奔及其入于夷儀也皆書衛侯而不名言其有歸道也及其歸而後書曰衛侯衎復歸于衛此所謂出而國無君者於歸名之也衛雖有君而衎有歸道焉猶無君也莒人侵我東鄙秋楚公子貞帥師伐吳冬季孫宿會晉士丐宋華閲衛孫林父鄭公孫蠆莒人邾人于戚十有五年春宋公使向戌來聘二月己亥及向戌盟于劉劉夏逆王后于齊外逆女不書過我不書天子之大夫不名書劉夏非大夫也夏從單靖公以逆而獨書夏過我也夏齊侯伐我北鄙圍成公救成至遇季孫宿叔孫豹帥師城成郛備齊也城雖不時非譏也秋八月丁巳日有食之邾人伐我南鄙冬十有一月癸亥晉侯周卒十有六年春王正月葬晉悼公三月公會晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯把伯小邾子于溴梁戊寅大夫盟衛侯剽也二十五年衛侯入于夷儀衎也二君皆稱衛侯猶鄭突及儀皆稱鄭伯也晉平公即位而為溴梁之會以諸侯燕于溫使諸大夫舞曰歌詩必類齊高厚之詩不類荀偃怒曰諸侯有異志矣使諸大夫盟高厚高厚逃歸於是叔孫豹晉苟偃宋向戌衛寧殖鄭公孫蠆曹莒邾薛杞小邾之大夫盟夫牡丘之會諸侯既次于匡書曰公孫敖帥師及諸侯之大夫救徐雞澤之會諸侯既盟而陳侯使袁僑如會書曰叔孫豹及諸侯之大夫及陳袁僑盟今諸侯既會將使大夫盟高厚高厚逃歸則書曰叔孫豹及諸侯之大夫盟可也獨書曰大夫盟何也諸侯既會而燕使諸大夫舞既非禮矣又曰歌詩必類求之無已而高厚不從過在晉也荀偃怒而使大夫盟高厚欲以强服諸侯則政在大夫也政在大夫以義服人猶可强則亂矣自是晉政在六卿故獨書大夫盟言無君也晉人執莒子邾子以歸齊侯伐我北鄙夏公至自會五月甲子地震叔老會鄭伯晉荀偃衛寧殖宋人伐許秋齊侯伐我北鄙圍郕大雩冬叔孫豹如晉十有七年春王二月庚午邾子牼卒十六年晉人執莒子邾子今書邾子牼卒則既釋之矣不書其歸不告也宋人伐陳夏衛石買帥師伐曹秋齊侯伐我北鄙圍桃高厚帥師伐我北鄙圍防不稱齊高厚見其亟伐也九月大雩宋華臣出奔陳華臣弱臯比之室使賊殺其宰華吳宋公怒將逐之故懼而出奔冬邾人伐我南鄙十有八年春白狄來夏晉人執衛行人石買十七年石買侵曹取重丘曹人訴之晉晉人因其使而執之買則有罪而執之於其使則非禮也故書曰執衛行人石買秋齊師伐我北鄙冬十月公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子同圍齊曹伯負芻卒于師楚公子午帥師伐鄭十有九年春王正月諸侯盟于祝柯晉人執邾子公至自伐齊取邾田自漷水成元年晉人敗齊于鞍使齊人歸我汶陽之田書曰取汶陽田不言齊魯地也本以晉命取田于邾故書曰取邾田自漷水言非魯地也季孫宿如晉葬曹成公夏衛孫林父帥師伐齊秋七月辛卯齊侯環卒晉士丐帥師侵齊至榖聞齊侯卒乃還八月丙辰仲孫蔑卒齊殺其大夫高厚齊侯出其世子光而立其少子牙使高厚傅之齊侯疾病崔杼逆光而立之光殺牙杼殺高厚而并其室故稱國以殺罪纍上也鄭殺其大夫公子嘉冬葬齊靈公城西郛叔孫豹會晉士丐于柯城武城二十年春王正月辛亥仲孫速會莒人盟于向夏六月庚申公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子盟于澶淵秋公至自會仲孫速帥師伐邾蔡殺其大夫公子燮蔡文侯欲事晉畏楚不能行而卒楚人使蔡無常公子燮求從先君以利蔡蔡人殺之稱國以殺非其罪也蔡公子履出奔楚陳侯之弟黃出奔楚陳慶虎慶寅畏公子黃之逼訴諸楚曰與蔡司馬同謀楚人以為討黃出訴于楚書曰陳侯之弟罪陳侯也叔老如齊冬十月丙辰朔日有食之季孫宿如宋二十有一年春王正月公如晉邾庶其以漆閭丘來奔庶其邾大夫也邾莒之大夫不書微也特書庶其重地也以地叛雖賤必書地以名其人終為不義弗可滅矣或求名而不得或欲蓋而名章齊豹為衛司寇作而不義其書為盜邾庶其莒牟夷邾黑肱以土地出求食而已不求其名賤而必書此二物者所以懲肆而去貪也若艱難其身以險危大人而有名章徹攻難之士將奔走之若竊邑叛君以徼大利而無名貪冒之人將置力焉故春秋書齊豹曰盜三叛人名所以懲不義惡無禮也左氏之說云爾豫因其說而申之曰春秋之法小國之大夫不書然紀裂繻來逆女則書以其接我也接我以禮而書貴之也小國之大夫來奔者亦衆矣雖接我而不書法也惟以地來奔則書惡其接我以利也然魯人非大夫而以地出奔者猶不書何也以利接我雖微必書詳內也以利接外以微故不書略外也略外而詳內此聖人處已之厚也夏公至自晉秋晉欒盈出奔楚九月庚戌朔日有食之冬十月庚辰朔日有食之曹伯來朝公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子于商任錮欒氏非禮也古者大夫去國君使人道之出疆又先於其所往二十有二年春王正月公至自會夏四月秋七月辛酉叔老卒冬公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于沙隨公至自會楚殺其大夫公子追舒追舒為令尹而寵觀起未益祿而有馬數十乘楚人患之故誅追舒罪不至死故稱國以殺二十有三年春王二月癸酉朔日有食之三月己巳把伯丐卒夏邾卑我來奔葬杞孝公陳殺其大夫慶虎及慶寅陳侯之弟黃自楚歸于陳陳侯如楚公子黃訴二慶于楚楚人召之二慶以陳叛楚屈建從陳侯圍陳陳殺二慶而納黃二慶之罪當死而陳不能誅也因楚而後克之故稱國以殺所以病陳也二慶死則黃之歸無難矣晉欒盈復入于晉入于曲沃欒盈在齊晉將嫁女于吳齊侯使析歸父媵之以藩載欒盈納諸曲沃盈帥曲沃之甲以入晉不勝反入曲沃書曰復入晉人之怨欒氏者衆難於復入也不書自齊何也齊之納盈非以兵明納之也譬如盜賊私納之耳故不書自齊秋齊侯伐衛遂伐晉八月叔孫豹帥師救晉次于雍榆己卯仲孫速卒冬十月乙亥臧孫紇出奔邾晉人殺欒盈齊侯襲莒二十有四年春叔孫豹如晉仲孫羯帥師侵齊夏楚子伐吳秋七月甲子朔日有食之既齊崔杼帥師伐莒大水八月癸已朔日有食之公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷儀冬楚子蔡侯陳侯許男伐鄭公至自會陳針宜咎出奔楚叔孫豹如京師大饑二十有五年春齊崔杼帥師伐我北鄙夏五月乙亥齊崔杼弒其君光齊侯背晉與楚且亂崔杼之室雖無道而崔杼立光殺光無君之心不可忍也故稱崔杼公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于夷儀六月壬子鄭公孫舍之帥師入陳秋八月己巳諸侯同盟于重丘公至自會衛侯入于夷儀楚屈建帥師滅舒鳩冬鄭公孫夏帥師伐陳十有二月吳子遏伐楚門于巢卒吳子伐楚而名何也名其卒也吳子伐楚而門于巢巢牛臣射而殺之不言滅何也死而非獲也死而非獲則卒也二十有六年春王二月辛卯衛寧喜弒其君剽衛侯衎入于夷儀使衛寧喜求復故喜弒剽而納衎不言衎之弒而言喜之弒何也喜弒而後衎得入則弒君之罪喜專之也衛孫林父入于戚以叛林父始與寧殖出衎而立剽寧喜納衎故林父以戚如晉書曰叛非以亂國將以自封也甲午衛侯衎復歸于衛夏晉侯使荀吳來聘公會晉人鄭良霄宋人曹人于澶淵秋宋公殺其世子痤晉人執衛寧喜八月壬午許男寧卒于楚冬楚子蔡侯陳侯伐鄭葬許靈公二十有七年春齊侯使慶封來聘夏叔孫豹㑹晉趙武楚屈建蔡公孫歸生衛石惡陳孔奐鄭良霄許人曹人于宋宋向戌善於晉趙武又善於楚屈建故會晉楚而求弭諸侯之兵既會楚人衷甲將盟又爭先晉人從而先之不較也然春秋書之卒先晉而後楚何也晉固主諸侯矣楚雖以力加之而晉之所以先諸侯者猶在也春秋豈以一時之先而易其所常先哉是以卒先晉言先後之不可以力爭也郎之戰鄭實主兵而先齊衛亦猶是也衛殺其大夫寧喜衛侯既入而患寧喜之專也殺之喜雖弒君而於衛侯為有功衛侯殺之則為不義故稱國以殺衛侯之弟鱄出奔晉衛侯之入也使鱄與寧喜要言焉既殺寧喜鱄病其失言也故出書曰衛侯之弟罪衛侯也秋七月辛巳豹及諸侯之大夫盟于宋冬十有二月乙亥朔日有食之二十有八年春無冰夏衛石惡出奔晉邾子來朝秋八月大雩仲孫羯如晉冬齊慶封來奔十有一月公如楚十有二月甲寅天王崩乙未楚子昭卒二十有九年春王正月公在楚夏五月公至自楚庚午衛侯衎卒閽弒吳子餘祭仲孫羯會晉荀盈齊高止宋華定衛世叔儀鄭公孫假曹人莒人滕人薛人小邾人城把晉侯使士鞅來聘把子來盟吳子使札來聘吳自成七年伐郯而書之曰吳終於春秋無加焉唯其卒則稱吳子戚之㑹則稱吳人柏舉之戰黃池之會亦稱吳子其卒也不可以不稱子而戚以鄫柏舉以蔡侯黃池以晉侯皆非進之也今其來聘也書子書名進之也以札之賢而修禮於中國不可不進也然終春秋曰吳蓋猶以夷終也秋九月葬衛獻公齊高止出奔北燕冬仲孫羯如晉三十年春王正月楚子使薳罷來聘夏四月蔡世子般弒其君固蔡侯為般娶于楚而通焉故及於弒君雖無道而罪不及民故稱臣以弒五月甲午宋災宋伯姬卒外災不日略之也宋災何以書日日伯姬之卒也伯姬待姆而卒於火是以日其災也然則春秋賢伯姬乎君子謂伯姬女而不婦女待人婦義事也天王殺其弟佞夫王子瑕奔晉靈王崩儋括欲立王子佞夫佞夫弗知尹言多劉毅單蔑井過鞏成殺佞夫括及瑕廖奔晉佞夫無罪五臣以王故殺之而王弗察猶王殺之也故書曰天王殺其弟佞夫王子瑕奔晉括廖不書賤也秋七月叔弓如宋葬宋共姬鄭良霄出奔許自許入于鄭鄭人殺良霄冬十月葬蔡景公晉人齊人宋人衛人鄭人曹人莒人邾人滕人薛人杞人小邾人會于澶淵宋災故三十有一年春王正月夏六月辛巳公薨于楚宫秋九月癸巳子野卒己亥仲孫羯卒冬十月滕子來會葬癸酉葬我君襄公十有一月莒人弒其君密州莒子生去疾及展輿既立展輿又廢之莒子虐國人患之展輿因國人攻而弒之非獨其子也春秋集解卷九
