body:
  text: 春秋集解卷三宋蘇轍撰莊公元年春王正月不書即位繼故也左氏曰文姜出故也文姜之出孰與桓公之薨且出在三月舍其大而言其細失之矣三月夫人孫于齊桓公之薨夫人與聞焉魯人責之故出奔不言奔諱之也不稱姜氏以為夫人之義絶不為親禮也或曰所以貶之也夏單伯送王姬單伯天子之卿也天子嫁女於諸侯必使諸侯同姓者主之王將嫁女於齊故使魯主之而單伯送之單伯不稱使何也外大夫使於魯則稱使詳之也於他國則否略之也單伯之女為齊行也故不稱使公羊穀梁曰此送王姬也然則單伯為魯大夫矣魯無單伯天子之世卿也且魯大夫必名使魯主之則周人送之齊人逆之足矣魯人何為逆之哉秋築王姬之館于外冬十月乙亥陳侯林卒王使榮叔來錫桓公命錫命者命之以策也衛襄公之沒也王使成簡公追命之曰叔父陟恪在我先王之左右以佐事上帝豫敢忘髙圉亞圉不稱天王闕文也王姬歸于齊自我歸之也不言齊之來逆館之于外弗與接也齊師遷紀郱鄑郚二年春王二月葬陳莊公夏公子慶父帥師伐於餘丘秋七月齊王姬卒冬十有二月夫人姜氏會齊侯于禚乙酉宋公馮卒三年春王正月溺會齊師伐衛夏四月葬宋莊公五月葬桓王秋紀季以酅入于齊紀季紀侯之弟也齊方無道其欲滅紀久矣紀非齊之敵也天子莫之治諸侯莫之救紀侯內則不能下齊外則不忍抗齊以殘其民將棄國而去故以酅與季使為附庸以無廢先祀故書曰紀季以酅入于齊言非叛也季之不名附庸之君且喜之也冬公次于滑四年春王二月夫人姜氏享齊侯于祝丘三月紀伯姬卒夏齊侯陳侯鄭伯遇于垂鄭伯鄭子儀也桓十五年五月書鄭伯突出奔蔡鄭世子忽復歸于鄭九月書鄭伯突入于櫟十七年髙渠彌殺忽而立子亹十八年齊襄公殺子亹鄭人立子儀莊十四年突使傅瑕殺子儀而入則遇于垂者子儀也然則鄭有二君矣可乎春秋有一國而二君者鄭突與儀衛衎與剽是也突衎始終為君儀之君鄭十有四年剽之君衛十有一年皆既能君者也故春秋因其實而君之然則孰與曰皆不與也突之入也以篡衎之出也以惡儀剽雖國人之所立而突衎在焉非所以為安也故四人春秋莫適與也皆不沒其實而已君子不幸而處於此如子臧季札可也不如是則亂不止昔者孔子之門人疑孔子之為衛輒也子貢入問之曰伯夷叔齊何人也曰古之賢人也曰怨乎曰求仁而得仁又何怨出曰夫子不為也故曰君子不幸而處於此如子臧季札可也紀侯大去其國大去者不反之詞也以國與季季奉社稷故不言滅不見迫逐故不言奔雖失地之君而原其行事則周亶父也故賢之而不名公羊曰何以不言滅為齊襄諱也春秋為賢者諱何賢乎襄公復讎也齊哀公烹於周紀侯譛之於是九世矣世蓋有復九世之讎者乎且襄公非志於復讎者也雖或以是為名春秋從而信之可乎六月乙丑齊侯葬紀伯姬內女不書葬此何以書齊以告也齊侯取其國而葬其夫人取之則有罪而葬之則禮也秋七月冬公及齊人狩于禚公忘齊之讎而越境以與其人狩非禮甚矣或曰齊人齊侯也不言齊侯為公諱也五年春王正月夏夫人姜氏如齊師秋郳黎來來朝冬公會齊人宋人陳人蔡人伐衛伐衛所以納朔也不言納將言朔之入故也朔以殺二兄為罪而諸侯納之言納則罪在納者而入者幸矣言入則罪在入者而納者亦未免也成十八年楚子鄭伯伐宋宋魚石復入于彭城言復入而不言納亦猶是也六年春王正月王人子突救衛夏六月衛侯朔入于衛朔之入猶有黔牟在焉故稱入秋公至自伐衛公及諸侯伐衛以納朔王人救衛不勝諸侯朔遂得入朔入而公至雖不言納而公之罪亦明矣螟冬齊人來歸衛俘七年春夫人姜氏會齊侯于防夏四月辛卯夜恆星不見夜中星隕如雨恆星不見夜明也星隕如雨衆也左氏以為與雨偕公羊以為雨星不及地尺而復按厯代天文志記衆星同隕者以為星隕如雨蓋無足怪也秋大水無麥苖是時麥熟五稼苖而未秀皆為水所害也冬夫人姜氏會齊侯于穀八年春王正月師次于郎以俟陳人蔡人甲午治兵夏師及齊師圍郕郕降于齊師秋師還冬十有一月癸未齊無知弒其君諸兒齊僖公母弟夷仲年生公孫無知有寵於僖公衣服禮秩如適襄公絀之故作亂不稱公孫將為君也凡弒君稱君君無道也然春秋所書無道而稱臣者六齊諸兒雖無道而無知以其私弒之故稱無知晉夷臯楚虔雖無道而趙盾公子比疑於無罪故稱盾及比陳平國蔡固雖無道而罪不加於國人故稱徴舒及般齊光雖無道而崔杼之惡甚於光故稱杼言各有所當已不必同也九年春齊人殺無知齊雍廩殺無知而稱人以殺言齊人皆欲殺之也不稱君不能君也公及齊大夫盟于蔇夏公伐齊納子糾齊小白入于齊凡當立者不言納與入如宋襄公之納齊孝公言伐而已不言納與入也言納與入非當立者也子糾小白皆齊襄公之庶弟而爭國故子糾言納而小白言入糾之言納而不言入納而未得入也小白之言入自入也不言歸子糾難之也不稱公子皆將為君也秋七月丁酉葬齊襄公八月庚申及齊師戰于乾時我師敗績九月齊人取子糾殺之子糾之死魯殺之也鮑叔謂魯子糾親也請君討之管召讎也請受而甘心焉乃殺子糾于生竇召忽死之管仲請囚其曰齊人取子糾殺之何也不豫齊人之使魯殺其親也故使齊其尸之且曰有國而不能庇一人亦所以病魯也公羊曰稱子糾宜為君也或因公羊而益之曰此殺未踰年之君也夫子糾小白皆以庶弟爭國未知孰宜為君也未知孰宜為君納而未得入而以為未踰年之君也可乎冬浚洙十年春王正月公敗齊師于長勺二月公侵宋三月宋人遷宿凡諸侯遷國自遷曰某遷于某人遷而有之曰某人遷某猶以為附庸也故不言滅夏六月齊師宋師次于郎公敗宋師于乘丘秋九月荆敗蔡師于莘以蔡侯獻舞歸荆楚之舊號也不稱荆人夷也獻舞之名失地也凡獲諸侯不言獲而言以歸尊之也冬十月齊師滅談談子奔莒凡諸侯滅同姓名其非同姓君行則稱君臣行則稱臣滅人之國其罪均也而其實不可不别談子之不名未通也不言出奔國滅無所出十有一年春王正月夏五月戊寅公敗宋師于鄑秋宋大水冬王姬歸于齊十有二年春王三月紀叔姬歸于酅叔姬始以媵歸紀紀侯去國無歸而叔姬歸魯及紀季自定於齊而後歸酅善其得禮故書稱紀叔姬明非嫁也歸魯不書非寧且非出也夏四月秋八月甲午宋萬弒其君捷及其大夫仇牧冬十月宋萬出奔陳十有三年春齊侯宋人陳人蔡人邾人會于北杏齊桓始合諸侯以平宋亂自是遂得諸侯故四國皆稱人言衆與之也僖二十八年晉文公與齊宋秦敗楚于城濮三國皆稱師蓋春秋之書始得諸侯者好會則稱人兵會則稱師以示衆與之也至襄八年晉悼公會諸侯之大夫于郉丘改命朝聘之數儉而有節則大夫亦皆稱人蓋亦衆與之耳夏六月齊人滅遂討其不會于北杏也秋七月冬公會齊侯盟于柯始及齊平也公羊於此言曹沫手劒劫桓公以求汶陽之田管仲許之要盟可犯而桓公不欺曹子可讎而桓公不怨桓公之信由此著乎天下豫以為此春秋之後好事者之浮說而非其實也齊魯之怨不在桓公曹沫無以發其怒一也使曹沫誠以劫得盟如華元子反則春秋要盟不書楚宋之盟書曰宋人及楚人平而不書盟今書公會齊侯盟于柯二也故公羊不足信也魯仲連稱曹子為魯將三戰三北失地五百里及桓公會諸侯曹子以一劒之任枝桓公之心於壇坫之上三戰所亡一朝而復案長勺之戰莊公始用曹沫以敗齊自是魯未嘗敗安得所謂三戰三敗而兵劫桓公求侵地者乎故仲連亦不足信也十有四年春齊人陳人曹人伐宋夏單伯會伐宋齊將伐宋請師于周假王命而行故單伯會之書曰單伯會伐宋後也凡天子之大夫出會諸侯不繫之王尊與諸侯比也王人而後繫之王微以王為重也秋七月荆入蔡冬單伯會齊侯宋公衛侯鄭伯于鄄宋服也天子之大夫與於會盟而魯不在則書之如魯大夫內之也十有五年春齊侯宋公陳侯衛侯鄭伯會于鄄自春秋以來陳序衛下齊桓始霸楚亦始强陳介於二大國而為三恪首故桓因而進之遂終春秋夏夫人姜氏如齊禮夫人父母在則歸寧沒則使大夫歸寧兄弟文姜之於齊桓兄弟也親行非禮也秋宋人齊人邾人伐郳郳宋之附庸而叛宋諸侯為宋伐之故以宋人主兵鄭人侵宋冬十月十有六年春王正月夏宋人齊人衛人伐鄭討其侵宋故以宋人主兵秋荆伐鄭冬十有二月會齊侯宋公陳侯衛侯鄭伯許男滑伯滕子同盟于幽會而不書其人內之微者也盟未有不同者也此其曰同盟何也有不同者服也於是鄭始聽命穀梁曰不言公疑與讎盟也柯之會公既與齊盟矣何獨至於幽而疑之讎雖不可與通而襄公亡矣桓公之霸不從則國病為國故許之也邾子克卒十有七年春齊人執鄭詹鄭既受盟而不朝齊詹鄭之執政也故齊人執之不氏未賜族也凡執大夫稱人何也諸侯之尊執一大夫得失未可以斥之也稱行人非其罪也不稱行人罪之也夏齊人殲于遂齊人滅遂而戍之不戒遂因氏頜氏工婁氏須遂氏饗齊戍醉而殺之書齊人殲于遂自取之也春秋之書敗亡其自取者三齊人殲于遂梁亡王師敗績于茅戎以為其所以自處者固敗亡之道而非敵之罪秋鄭詹自齊逃來詹之義當以身受齊責以紓國患而逃遁自免故不書來奔而書逃來賤之也冬多麋十有八年春王三月日有食之夏公追戎于濟西不言戎之侵何也未及侵而追之追之而去兵未嘗交也秋有􅈮􅈮短狐也含沙射人生於南方魯之所無凡稱有皆所無也冬十月十有九年春王正月夏四月秋公子結媵陳人之婦于鄄遂及齊侯宋公盟媵不書以遂事故書其曰陳人之婦略言之也大夫受命以出共命而不敢專政也有可以安國家利社稷不得已而專之可也非利而專之則是擅命者不稱公子翬之伐鄭伐宋是也結雖擅命而稱公子蓋許之也夫人姜氏如莒莒非父母之國而往姦也冬齊人宋人陳人伐我西鄙二十年春王二月夫人姜氏如莒夏齊大災秋七月冬齊人伐戎二十有一年春王正月夏五月辛酉鄭伯突卒秋七月戊戌夫人姜氏薨冬十有二月葬鄭厲公二十有二年春王正月肆大眚肆釋也眚過也書曰眚災肆赦非常事故書癸丑葬我小君文姜文姜之惡甚矣而薨葬盡禮春秋無異辭焉何也君雖不君臣不可以不臣父雖不父子不可以不子子為父隱道在其中矣而文姜之惡何損焉陳人殺其公子御寇凡殺其臣惟世子母弟稱君以為人君之尊殺一大夫得失未可以斥之也故稱人以殺殺有罪也以為國人殺之也稱國以殺殺無罪也以為國君殺之也其曰殺其大夫云者雖殺有罪猶以殺大夫為惡也殺其公子則又甚矣凡殺大夫皆稱名大夫生名殺而名之正也殺而不名賢之也夏五月秋七月丙申及齊高傒盟于防冬公如齊納幣二十有三年春公至自齊祭叔來聘祭叔祭公之屬也祭公天子之卿士不正其外交故不言使也夏公如齊觀社公至自齊荆人來聘荆之稱人以其來聘特書也不曰荆子使某來聘未列於中國也公及齊侯遇于穀蕭叔朝公蕭叔附庸之君未王命者不言來公在外也禮朝聘於廟於外非禮也秋丹桓宮楹公將娶於齊故丹桓宮之楹刻桓宮之桷以誇示齊女非禮也不言新宮久也冬十有一月曹伯射姑卒十有二月甲寅公會齊侯盟于扈二十有四年春王三月刻桓宮桷葬曹莊公夏公如齊逆女親迎禮也穀梁曰親迎常事此其志何也不正其親迎於齊也夫常事不志歲事之常也親迎可以常乎親迎而不志則踰年即位可以不志矣秋公至自齊八月丁丑夫人姜氏入公不與夫人皆至夫人不從公而自入失夫婦之正也戊寅大夫宗婦覿用幣大夫執贄以見夫人禮也公將以侈夸之故使大夫及宗婦皆見且皆用幣用者不宜用者也男贄大者玉帛小者禽鳥女贄不過榛栗棗修大水冬戎侵曹曹羈出奔陳羈曹莊公世子既葬而不稱爵不能君也公羊曰羈曹大夫也曹無大夫羈之書三諫而去賢之也以為曹無大夫則二十六年曹殺其大夫何也以為有大夫乎則賢羈而不氏何也故曹羈者曹之世子而非大夫也赤歸于曹赤曹公子歸為君者也羈出則赤歸無難矣郭公闕文也公羊穀梁曰郭公赤也失國而歸于曹也使郭公失國而歸于曹將書曰郭公赤出奔曹先書赤歸于曹而繼之以郭公非詞也二十有五年春陳侯使女叔來聘陳自是通好於魯故嘉之不名夏五月癸丑衛侯朔卒六月辛未朔日有食之鼓用牲于社禮日食則天子不舉伐鼓于社諸侯用幣于社伐鼓于朝故書曰乃季秋月朔辰弗集于房瞽奏鼓嗇夫馳庶人走今魯鼓而用牲于社皆非禮也伯姬歸于杞不書杞來逆女逆者非卿非禮也秋大水鼓用牲于社于門亦非禮也凡天災有幣無牲非日月之眚不鼓冬公子友如陳魯大夫出朝聘曰如何也禮成在外未可必於我也公子友莊公之母弟也其不稱弟何也母弟之親於其相殺及奔則正之其餘則否非義之所在也二十有六年春公伐戎夏公至自伐戎曹殺其大夫稱國以殺而大夫不名殺無罪也公羊曰大夫之不名衆也晉殺其大夫郤錡郤犨郤至亦衆矣而名之何也秋公會宋人齊人伐徐冬十有二月癸亥朔日有食之二十有七年春公會杞伯姬于洮非禮也天子非展義不巡守諸侯非民事不舉卿非君命不越境夏六月公會齊侯宋公陳侯鄭伯同盟于幽秋公子友如陳葬原仲原仲季友之舊也越境而葬其舊非禮也原仲之字大夫既沒不名也冬杞伯姬來莒慶來逆叔姬杞伯來朝公會齊侯于城濮二十有八年春王三月甲寅齊人伐衛衛人及齊人戰衛人敗績十九年王子頽作亂不克奔衛衛師燕師伐周立子頺二十七年王使召伯廖賜齊侯命且請伐衛於是齊侯伐衛敗之取賂而還書齊人以賂故賤之也書衛人及齊人戰罪其不服也不地戰於衛也伐不言日伐不以日成也此其稱甲寅何也戰之日也夏四月丁未邾子瑣卒秋荆伐鄭公會齊人宋人救鄭冬築郿大無麥禾書於冬者五穀畢入計食不足而後書也是歲未嘗有水旱螟螽之災而書大無麥禾何也劉向春秋說曰土氣不養稼穡不成也沈約宋志言吳孫皓時嘗有之苗稼豐美而實不成百姓以饑闔境皆然連歲不已此則所謂大無麥禾也臧孫辰告糴于齊大夫出聘於諸侯曰如而不曰聘不必其成禮也告糴之不言如何也告者在我雖不得糴猶告也凶年告糴急民病也二十有九年春新延廄因舊曰新改舊曰新作新作則書新不書此何以書凶年不新可也凡馬日中而出日中而入因其出而新之不若因其入而新之也夏鄭人侵許秋有蜚冬十有二月紀叔姬卒紀雖滅而叔姬守義于酅故繫之紀賢而録其卒葬城諸及防三十年春王正月夏次于成齊將降鄣故出兵以備之將卑師少故言次秋七月齊人降鄣鄣紀之附庸也齊人力降之復為附庸故不言滅紀已入齊鄣無所附故不言取八月癸亥葬紀叔姬九月庚午朔日有食之鼓用牲于社冬公及齊侯遇于魯濟齊人伐山戎三十有一年春築臺于郎夏四月薛伯卒築臺于薛六月齊侯來獻戎捷非禮也凡諸侯有四夷之功則獻于王王以警于夷中國則否諸侯不相遺俘而况親獻之乎秋築臺于秦郎薛秦皆地也一嵗而三築臺譏其勤民而傷財也冬不雨凡不雨甚則曰大旱甚而厯時則首月必書三十有二年春城小穀小穀管仲之邑也魯人德齊桓而為管仲城邑非常法也然而管仲之功加於天下義之所許也凡城諸侯城其國曰城某國城其邑曰城某邑邑有常處不待國别而知也夏宋公齊侯遇于梁丘齊桓為楚之伐鄭也請會於諸侯宋公請先見齊侯故書先宋秋七月癸巳公子牙卒莊公世子般公弟慶父叔牙季友公疾問後於叔牙牙欲立慶父問於季友季友請以死奉般於是以君命鴆叔牙曰飲此則有後於魯不然死且無後牙飲之而卒立叔孫氏叔牙將為亂而未成季友因其未成也誅之而不名其罪且不廢其後兄弟之恩君臣之義至矣故從而書之曰公子牙卒以為得其道也八月癸亥公薨于路寢公薨必地詳凶變也薨於路寢得正也冬十月己未子般卒慶父使圉人犖賊子般于黨氏書曰子般卒諱之也其名莊未葬也不書葬未逾年之君也有子則廟廟則書葬無子不廟不廟則不書葬公子慶父如齊慶父既賊子般而奔齊其曰如何也書奔是名慶父之罪也書如則未名慶父之罪也名慶父之罪必誅之而後可以兄弟之故因其出奔而緩之且為之諱親親之義也公子牙今將耳季子不免慶父弒君何故不誅將而不免遏惡也既而不可及緩追逸賊親親之至也狄伐郉春秋集解卷三
